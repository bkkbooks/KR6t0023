body:
  text: 華嚴一乘義私記問花嚴者梵語歟漢語歟答漢語也問爾梵如何言耶答梵云健拏驃訶問相配梵漢如何耶答健拏者云雜花驃訶者云嚴飾具可言雜花嚴飾經略云花嚴經問何故花言健拏嚴云驃訶耶答西國有一供養之具其重有六重下闊上狹毎重置佛像説此經中重疊六位六位成佛相似其義所以花云健拏嚴云驃訶云云花嚴云花四種蓮花之中何蓮華耶答反問先其四種蓮花者何耶答溫鉢羅華拘物頭花新經云拘某陀花鉢豆摩花新經云鉢持摩花奔荼利花也漢如次青黄赤白四種蓮花也答今花嚴云花奔荼利花也白蓮也問何故有四種蓮花拘取白蓮華嚴此經答如有白色諸色之中根本爲顯花嚴一乘諸乘根本云言取白蓮華飾此經也喩也問法花經云光云白毫之光云嚴云白拂云牛大白牛云以是見取白蓮花事顯也今此經爾云文無何可云取白蓮花飾是經答法花一乘與華嚴一乘宗一所以准法花經取白蓮花云飾此經無妨問以何知法花一乘與花嚴一乘宗一云言耶答法花經露地牛車自有教義謂十十無盡主伴具足即如説花嚴經云問何可知以此文法花一乘花嚴一乘宗一云事答既差露地大白牛車如説花嚴經云所以知又法花一乘花嚴一乘宗一云事云云問約一乘若有種耶答爾有問有幾種耶答有三種問其三種者何答一者存三之一乘二者遮三之一乘三者直顯一乘也直顯之一乘亦名表體之一乘問且何云存三一乘耶答般若深察等經云存三一乘問何故般若深密等經云存三一乘耶答不破三乘疑執不會二乘行果就無我之理一説一乘故般若深密等經云存三一乘也意乍存三説一乘云事也問何以知深密經名存三之一乘云事答其經言相生勝義無自性如是我皆已顯示若不知佛密意失壞正道不能往故於其中立一乘非有情性無差別云云以此文知深密經名存三一乘云事問何以此文了知深密經名存三一乘云事答故於其中立一乘者於三因三果就無我理一説一乘事也非有情性無差別者存三乘行果説一乘事也所以是文知深密經名存三之一乘云事三因三果者三乘因果也問何以知般若經名存三一乘云事答大般若經第四百四云復有菩薩摩訶埵具足六神通遊戲自在從一佛國至一佛國所至國土無有聲聞獨覺之名唯有清淨一乘行者云以是文知般若經名一乘云事問爾名一乘事爾也何以知般若經名存三云事答同經云第一百六十八云由此復有一切聲聞乘一切獨覺乘一切大乘出現世間云以是文知般若經名存三云事問何曰三乘行果耶答聲聞乘之行果獨覺乘之行果菩薩行果是云三乘行果即如次羊車鹿車牛車喩問何云聲聞乘行果等耶答聲聞種姓之人所修三科五蘊十二處十八界也四諦苦集滅道等行云聲聞行彼所證預流果等四果云聲聞果獨覺種姓人所修十二因縁行云獨覺行彼所證阿羅漢果云獨覺果菩薩種姓人所修三性三無性唯識六度之行云菩薩行彼所證菩提涅槃果云菩薩果云云問無性攝論十義一乘云存三遮三直顯三一乘中攝不攝耶答攝也問何攝乎答攝存三一乘也問爾先其十義一乘者何答無性攝論云爲引攝一類及任持諸餘由不定種姓諸佛説一乘法無我解脱等故性不同得二意樂化究竟説一乘云云是云十義之一乘問爾依此二行頌開出十義一乘事何答一者爲引攝一類説一乘二者爲任持諸餘説一乘三者法等故説一乘四者無我等故説一乘五者解脱等故説一乘六者性不同故説一乘第七與第八令得二意樂故説一乘九者化故説一乘十者究竟故説一乘云也問且爲引攝一類説一乘云意如何答爲引攝舍利弗淨目天子法財王子等一類之不定種姓聲聞人説一乘云事也問何故爲此人説一乘答舍利弗釋迦昔在大通智勝佛第十六子時聞説法花經起大乘心依婆羅門施眼退大行取小乘果彼取小果入無餘涅槃畏灰身滅智彼爲令不取小乘果説一乘云問爾此人從何位退大行答十住之中從第六住退問何以知從第六住退云事答優婆塞戒經云舍利弗六十劫修大乘行依婆羅門施眼退云所以知從第六住退云事又八萬劫退云云今會云若説雜劫八萬等若説純劫六十劫云云問何以此文了知從第六住退云事答菩薩百劫修十住行而六十劫修退云明知第六住退云事問法花論説退已還發大菩提心聲聞云今此云舍利弗等一類不定種姓聲聞云若同歟異歟答同也問何同耶答退已者舍利弗昔退大乘行還發者舍利弗今云遇法花會聞説一乘迴心向大問何以知爾乎答經云我昔教汝志願佛道汝今悉忘而便自位已得滅度我今還欲令汝憶念本願所行道故爲諸聲聞説大乘經云又云舍利弗言我今無復疑悔親於佛前得受阿耨多羅三藐三菩提記等云云以是文知退已者昔云退大乘行還發者迴心向大云事問爾舍利弗耳名退已還發大菩提心之聲聞餘聲聞不名乎答爾也問其故何答舍利弗昔遇縁退大行取小乘果今靈山遇法花會聞説一乘迴心向大故名之餘不定種姓聲聞不爾故不名問以何爾知乎答經云親友有官事當行貧人醉酒臥以無價寶珠繋差内衣裏捨去云云以此文知移他界之間退大乘行事問何爾知乎答親友者釋迦也貧人者舍利弗也寶珠者一乘種子也内衣裏者第八識也問經云飮他毒藥者何答舍利弗退大乘行隨那闍耶外道學彼典籍云飮他毒藥也謂那闍耶者略也具可云那闍耶毘羅低子漢云相子六師外道之中第三苦行外道者也六師外道者斷見外道常見外道苦行外道自然外道自在外道無慚外道也問舍利弗遇馬勝比丘悟三諦者何答解苦集滅不解道諦也問何爾乎答馬勝比丘爲乞食入城時佛誡命道可過人爲多不可説法由是馬勝但説三諦不説道諦故不悟也問爾彼説偈相配三諦何答偈云諸法從縁生此法縁及盡我師大聖主如是説此偈云云初諸法從縁生此法者説苦諦文也縁者説集諦文也及盡者説滅諦文也道諦法廣大舍利説不可信解所以佛不可多説誡也三乘種姓有身中人名不定種姓也此三種姓無身中人云無姓有情也問涅槃經三種病人何答一者醫遇不遇定差謂定姓大乘根機勝故佛菩薩化縁遇不遇三無數劫中修大乘行定成佛喩之二者遇醫差不遇不差謂不定種姓遇佛菩薩化縁成佛不遇取小乘果喩之三者遇醫不遇不愈畢死謂定性二乘無姓共不成佛喩之問聲聞乘聲聞種姓同歟異歟答四諦教理行果云乘能修行之所被機云種姓也餘乘亦爾也五驚怖者一損驚怖謂小乘人聞小乘教以其爲實謗無大乘今爲聞大乘説先小乘非實而翻道生疑是云損驚怖翻道生疑者先説有小乘涅槃而今説小乘涅槃非究竟大乘涅槃是實涅槃此乘涅槃又疑非究竟也二多事驚怖謂煩惱地前菩薩不定種姓者彼聞大乘行三無數劫中久遠可難修事生恐懼退大乘行可取小乘果爲令其不退説一乘也三顛倒驚怖謂煩惱尤重不能聞一乘若爲説一乘更生煩惱顛倒可驚怖所以爲不説一乘四悔驚怖謂退大乘行取小乘果今聞説大乘悔昔修小乘行也五誑驚怖謂増上慢人也彼得小乘涅槃道滿更念無餘涅槃而今爲説大乘涅槃彼何如來欺誑我等而驚怖也經云舍利弗如是増上慢人退亦佳矣等文也問爲任持諸餘説一乘云意何答爲地前位不定種性菩薩云説唯一無二也問何故爲是菩薩説唯一無二答地前位十住中第六住以前退位彼聞大乘行久遠難修退取少乘果入無餘涅槃灰身滅智可不成佛彼不退爲令成佛説唯一無二言也舍利弗等一類聲聞退大乘行果既取小乘果所以其云爲引攝也地前不定種姓菩薩可退大乘行未退所以其云爲任持問約地前不定種姓菩薩有漸悟頓悟皆共爲任持説唯一無二答正爲漸悟菩薩説唯一無二兼令被頓悟菩薩問爾意何答漸悟菩薩機根劣故退大乘行可取小乘果彼令不退説唯一無二也頓悟菩薩機根勝故不待佛唯一無二説自修行大乘行而佛以一音説法時衆生隨類受解何不被頓悟菩薩維摩經云佛以一音演説法衆生隨類各得解或有恐怖或歡喜或生厭離或斷疑云云以是文知爾也又花嚴經云如來於一語言中演説無邊契經海云云約地前地上菩薩有四不退一信不退謂十信中第六信也不退外道故也二住不退謂十住中第七住不退二乘故也三證不退謂初地已上起無漏智證眞如故四行不退謂八地已上無漏智行相續不間斷故也問至第六信者不退外道者何舍利弗十住之中第六住退隨那闍耶外道學彼法文耶答彼雖學其法文不退意樂所以不相違意樂者隨外道雖學彼是非眞實道理從是外念可有眞實之道理故不退意樂也問三乘別者取趣眞如可別何眞如一故云説一乘乎答譬如三獸雖體異渡河一又乳牛之色雖別白黒所漉乳皆如白色三乘異所證眞如平等一味也問其三獸者何答兎馬象也兎浮渡河是喩聲聞淺解也馬踏半渡是喩獨覺半悟象踏底渡是喩菩薩深悟也問眞如一者三乘同證一眞如乎答二乘證生空眞如菩薩證生法二空眞如也故不同也問所證眞如有差別者何云眞如一故説一乘乎答約證生空眞如邊云也約不證法空眞如不云也故不相違斷煩惱障所顯者云生空眞如二乘人所證也斷所知障所顯者云法空眞如菩薩所證也問無我等故説一乘云意何答有眞實補特伽羅可有乘差別補特伽羅無差別故乘亦無差別故説一乘補特伽羅者人我之異名也即三乘人名也補特伽羅梵語也漢翻云數取趣依極煩惱數趣行五趣四生受生故云數取趣也約二無我就人無我説一乘也問爾就法無我説一乘乎答就法無我亦説一乘也既深密經相生勝義無自性於其中立一乘故云爾也於五蘊假者觀無我也解脱等故説一乘者三乘之人約煩惱障同得解脱故也二乘之人於煩惱障斷其現行種子不斷習氣佛菩薩共斷之於所知障二乘之人乍三不斷佛者現種習三斷之問約障得解脱不同何解脱等故云説一乘乎答於煩惱障云爾也非是所知障故深密經云三乘同座一解脱床云云煩惱障礙二乘之菩提果不礙無上菩提果所以斷自果障煩惱障可不斷所知障無上菩提果煩惱所知共障所以佛菩薩共斷盡云云性不同故説一乘者不定種姓人身中有三乘之姓也故云説一乘也問爾者可説三乘何云説一乘乎答具有三乘性身中人必定可成一大乘果故云説一乘也令得二意樂故云説一乘者約意樂者佛約聲聞人得同自體之意樂故云説一乘者得我即彼彼即我我既成佛彼亦可成佛意樂故云説一乘問聲聞身中五蘊等法是有漏如來身中五蘊等法是無漏也有漏無漏既別何如來我與聲聞得自體同意樂答聲聞身中眞如理與如來身中眞如理體是同所以就眞如理一我與聲聞云得同自體意樂也後意樂意者佛於聲聞人得同自體意樂言我則彼彼即我我既成佛彼亦可成佛言一音之下令得二益故云説一乘二益者一者聲聞人佛所攝得同自體意樂二者同名菩薩得記別是云二益謂聲聞人佛所得同自體意樂云云我身即如來如來即我身之同自體之意樂攝得又舍利弗同會侍同名菩薩佛爲聲聞人説同自體意樂得可成佛記別問初意樂與後意樂有何別乎答初意樂佛於聲聞人得同自體意樂後意樂意聲聞人佛所攝得同自體意樂所以義雖云少異也化故云説一乘者爲應化人説一乘也則富樓那等五百人也依此有二意一爲引異類不定種姓聲聞人依小乘令不入無餘涅槃説一乘二爲對治二乘慢説一乘也初意者佛菩薩現聲聞形入無餘涅槃經八萬等劫從彼出發大乘心現成佛實類不定種姓聲聞人見是往昔耆尊入涅槃人從彼出發大乘意成佛況我等令思不樂成佛入涅槃也後意者二乘人欲得我此涅槃佛所爲高擧心所以令念如來得此涅槃而佛菩薩化聲聞形示現入涅槃所以説一乘楞伽經云樂著三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身乃至劫不覺譬如昏醉人酒消然後覺法亦然得佛無上身云云花嚴師問云此文入無餘涅槃二乘人佛菩薩引攝被導證從彼出迴心向大文也爾物何證佛菩薩化聲聞之形入無餘涅槃從彼出文云非實二乘乎法相師答云若入無餘實二乘所導佛菩薩引攝證彼出迴心向大文者入無餘實二乘灰身滅智同虚空故不墮有情趣不墮非情趣唯有清淨眞如法界有何物所導佛菩薩引攝從彼出可迴心向大既文譬如昏醉人酒消然後覺法亦然得佛無上身云云明知是化一乘也非實二乘事所以瑜伽云入無餘二乘不墮有情趣不墮非情趣唯有情淨眞如法界云云又莊嚴論云餘人善根涅槃時盡菩薩善根非然云云謂餘人者二乘人既二乘善根涅槃時盡云云依何從無餘出可迴心向大乎究竟故云説一乘者於眞如更復無勝乘理究竟殊勝故云説一乘也問此十義一乘通定性不定性有種性無種性説一乘答隨宜通也謂爲引攝一類與任持諸餘性不同故但約二乘不定種性人説一乘法等故解脱等故約三乘定性不定性人説一乘無我等故究竟故通定性不定性有性無性説一乘今得二意樂化約二乘不定性大乘定性説一乘也玄賛引無性攝論文説十義一乘事了已上存三一乘義了遮三一乘者會三乘行果破三乘疑執説一乘法花等經云遮三之一乘也三乘疑執者佛成道聞説菩薩可成佛二乘人我等可不成佛疑是云二乘疑二乘人二乘果執極果是云二乘執菩薩聞佛成道説菩薩可成佛執菩薩可成佛是云菩薩執昔説三今亦可説三何疑不説三乘説一乘是云菩薩疑也法花中遮三乘疑執云十方佛土中唯有一乘法無二亦無三除佛方便説又云聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑覺三乘人可皆平等成佛故二乘疑菩薩執共除説唯有一乘法無二亦無三覺大乘果是極果二乘果非極果故二乘執除之説除佛方便説昔説三覺方便説非眞實説故菩薩執除之也問法花一乘深密一乘同異如何答深密一乘就法無我等十義乍存三乘五性道理密意説一乘法花一乘就佛性平等皆成佛究竟道理顯了説一乘所以其意玄異法相師云凡諸大乘經佛説一乘所以不過攝論十因莊嚴八因顯揚六因何深密一乘云説就法無我等十義法花一乘不云説法無我等十義答既經文若聲聞菩薩乃至皆成佛無疑云云又汝等所行乃至悉當成佛云云遮三乘五性道理説一乘攝論十義其意玄異也莊嚴八因者其論第五云未定性聲聞及諸餘菩薩引攝於大乘定性説一乘法無我解脱等故性不同得三意涅槃究竟説一乘云云是云八因雖別開合意同如文可知顯揚六因者其論第二十云有六因縁故如來宣説一乘一其諸法就無差別相故二云就差別行相故此二就平等地説先是即所觀也後是即能觀也三衆生無我及法無我平等故四解脱平等故五能變化住故六行究竟故此六亦存二滅説差別位爲一乘云云是云六因也問法花經宗不存三乘五性者何藥草喩品大小菩薩上藥草聲聞獨覺中藥草輪王釋梵下藥草云云存三乘五性道理又法花論云四種聲聞授記退菩提聲聞應化聲聞佛授記決定性聲聞増上慢聲聞根未熟故菩薩與記令發心云云法花經遮三乘五性道理説一乘者其決定聲聞者何乎答昔説深密經時説三乘五性道理今至法花會以喩拈擧説可三乘五性皆成佛所以説三草二木生長不同喩畢法文云汝等所行乃至悉當成佛云云不云非有情性無差別明知是不法花經正宗其深密經意也問經汝等所行乃至悉當成佛者論云不定種姓人身中種子無上云云爾何遮三乘五性道理一切皆可成佛説乎答法花論云種子無上者擧舍利弗等一類不定種性之人身中種子無上兼定性無上但非不定種姓人身中種子無上所以不相違論意也法相師云不定種姓之人身中有可得無上菩提果法爾無漏種子亦昔修大乘行所熏習菩提心種子亦有不滅所以彼因可成佛定性二乘人取小乘果入無餘涅槃有可灰身滅智種子故無可得無上菩提果種子無種姓人無可得出世二乘聖果種子無可證無上菩提果法爾無漏種子爾何云非不定種性之人身中種子無上兼定性二乘無種性之人身中種子無上可三乘五性一切皆成佛乎答他宗始教心而依深密等經瑜伽等論就有爲無常法中立種姓故不能遍一切衆生今一乘宗終教已上意而依法花涅槃等經起信等論就眞如本覺無爲常住法中立種性故云可三乘五性一切皆成佛也問何會二乘行果答不定種姓聲聞人昔佛聞説四諦教依彼修行所證得二乘果今至法花會聞佛説唯一無二早修大乘行可得大乘果物悔修小乘行得小乘果悔所以今至法花會佛會其言汝今就大乘根機汝息分段苦以方便於一乘分別説三令得小乘果是入大乘因縁也悔不可悔得小乘果云汝等所行乃至悉當成佛云云是云會二乘行果又經云舍利弗言我今得未曾有心懷大歡喜疑悔皆既除又我今無疑悔親於佛前得授阿耨菩提記云云問何會菩薩行果乎答三乘之人昔聞佛依深密等經説三因三果各別道理依此爲求摩醯首羅智處成佛果地前地上位中修三無數劫行今至法花會佛聞説唯一無三疑云昔説三今亦可説三何昔説三今説一若是究竟法歟若是所行道所以今至法花會佛會其言汝今就一乘根機汝息分段苦以方便於一乘分別且説大乘因果知汝等根機熟引爲令得別教一乘出出世益説唯一無三亦説汝等所行等是云會菩薩行果也問三乘菩薩從菩薩行果入菩薩行果何可會汝等所行是菩薩道乎答三乘菩薩所修行一乘菩薩所修行雖倶是菩薩行權實既異所以捨三乘權行迴入三乘之外一乘之行云會汝等所行是菩薩道所以説菩薩行果亦迴問家内所授門外所授同牛車也喩既以無異法無異爾何三乘菩薩所修行權一乘菩薩所修行實云説迴菩薩行果答家内所授車是玩好之具假黒牛車也門外所授車是以衆寶莊嚴實大白牛車也約喩假實黒白既異於法亦何可無權實云無三乘菩薩所修行一乘菩薩所修行異立三乘三車何可遮四乘四車道理是尤背經竟也所以疏第四卷云談權教人以法花一乘令同深密一乘其誠可悲云云問三乘一乘所引權實何答三乘菩薩三賢十地位中三無數劫行行布次第修滿證摩醯首羅智處佛果是云權一乘菩薩初發心位中兼攝後後諸位行初發心位中證十身慮舍那果是云實也所以云權實別也三乘行者行布次第門意也一乘行者圓融相攝門意也已上遮三之一乘了直顯一乘者不對二乘不會行果而對普賢等大機直顯法界成佛體故花嚴等云直顯一乘也問不對二乘不會行果者花嚴會二乘人不侍耶答爾也問何第八會舍利弗等二乘人侍如聾如盲也答章云爲顯法深勝云事示如聾如盲形云云又云指歸云如依黒顯白云云意大菩薩成聲聞形一乘法爲顯二乘人所不能聞知云事示聾盲形云云問何以知二乘人在第八會如盲云事答入法界品云譬人初生時在二天誕是一名同生一名同名天見人人不見天如此二乘人侍如來所如來見二乘二乘不見如來亦不聞法云云問約第八會有本會末會其二會聲聞者共是權現聲聞歟答爾也問爾者何舍利弗從佛所退從自房出將六千弟子文殊邊迴心解十大法門答是亦權現迴心也非實迴心也於權現人有表法衆寄法衆本會之舍利弗是表法衆也所以爲顯法深勝故大菩薩化聲聞形示如聾如盲之形末會舍利弗是寄法衆也所以依同教爲顯迴入別教故大菩薩成聲聞形文殊邊迴向解十大法門也問何以知末會聲聞倶是權現乎答入法界品云舍利弗等聲聞人遊行無邊法界得不死通明得遍法界身云云明知是權現聲聞非實聲聞若實聲聞但見三千界事可不見餘界事何遊無邊法界亦實二乘身既分段何云得遍法界身不死通明者不死者不生涅槃也無漏通明也爲顯無生滅故云不死也通者六通也明者三明也是等皆菩薩所得也非二乘所得故非實聲聞問花嚴會舍利弗法花會舍利弗倶是權現歟答菩提思量論云法花會舍利弗是權現也故共權現也問法花會舍利弗是權化者何法花論云富樓那等五百人云權現人舍利弗等云退已還發大菩提心聲聞不云權現人乎答其擧勝義云爾也不言舍利弗非權人問何故花嚴對二乘不破彼疑執不會彼行果乎答花嚴二乘不聞知故性起品一切聲聞縁覺不聞此經云云問花嚴對二乘不説者何爲破三乘人定執見云説六相教乎答其正爲而不被引爲傳爲而被今約正爲云不聞二乘也花嚴一乘門有三種成佛一位成佛二行成佛三理成佛也是總云法界成佛也其三種成佛者一衆生成佛時三種世間皆共成佛一衆生斷惑證理時三種世間皆共斷惑證理今花嚴經説此道理故云顯法界成佛體也三種世間者一器世間二衆生世間三智正覺世間也器世間者山河大地等也其中住者云衆生世間三身十身佛云智正覺世間也已上直顯一乘義了已上三種一乘義已了於一乘如有三種又於三乘有三種者一始別終同三乘二始同終別三乘三近異遠同三乘也始別終同三乘者阿含等經倶舍等論也二乘人初修因行時聲聞修四諦行縁覺修十二因縁行故云始別終至證果同證阿羅漢果入無餘涅槃倶灰身滅智故云終同也又三乘人四諦縁生六度異終至證果同入無餘涅槃灰身滅智所以云始別終同三乘也始同終別三乘者三乘人始修因行時倶聞般若空教同觀無性理故云始同終至證果三乘人各證自乘果故云終別也由此義般若等經云始同終別三乘也問約無性理有人無我法無我無性理爾三乘共觀乎答二乘人觀人無我無性之理菩薩二無我理倶觀也但於人無我理三乘共觀故云同也不相違問三乘人四諦縁生六度異終至證果各證自乘果故可云始終各別三乘何云始同終別三乘乎答聲聞人聞般若教觀四諦法無性理獨覺聞般若教觀十二因縁法無性理菩薩聞般若教觀唯識六度等法無性理聞一教其下各別生解所以云始同終別顯也故大般若經第五百九十三云於聲聞乘性決定者聞是法已速得自乘無漏智於獨覺乘性決定者聞是法已速依自乘而得出離於菩薩乘性決定者聞是法已速得無上菩提果雖未入正性離生三乘性不定者聞是法已發無上菩提心云云以是文知云爾事也正性離生者見道位也正性者無漏者正道也生者分別煩惱也竟見道位無漏正道離分別煩惱也問何故分別煩惱性名生乎答隨喩爲名譬如生食在身中諸病者根本分別煩惱在有情身中諸煩惱根本故名生也問既般若經攝在存三之一乘何今云始同終別三乘乎答般若經一與三和合説故攝一乘攝三乘爲引不定種姓人依法無我等別義以密意説一乘義邊攝一乘三乘人同聞般若教以各得自果義邊攝三乘云云近異遠同三乘者以方便依般若深密等經於一乘分別説授三因三果各別道理令得三乘出世益故云近異引三乘子同令得三之外一乘出出世益故云遠同也故法花等經云近異遠同三乘也問何故得三乘出世益云近異得一乘出出世益云遠同乎答聲聞乘人依聲聞教預流果等位得出世益獨覺人依獨覺乘教更不證前三果第四阿羅漢果位得出世益菩薩依諸大乘教發心住已上位得出世不退益所以云近異引其得三乘出世益之人令得一乘出出世益究竟佛果所以云遠同問但可云得三乘出世益得一乘出出世益之三乘何云近云遠答聲聞三生六十劫得果獨覺四生百劫得果菩薩初僧祇中修得果所經之時短所以云近三乘人各別依自乘得出世果所以云異三乘同迴入一乘具修滿三無數劫行共成佛所經之時長所以云遠三乘同倶得無上菩提佛果所以云同也問聲聞三生六十劫何乎獨覺亦爾也答於聲聞有利根鈍根人利根三生得果鈍根六十劫得果於獨覺又有利鈍利根人四生得果鈍根人百劫得果也問宅内所授三車門外而所授大白牛車相配近異遠同何答宅内所授三車近異也門外而所授大白牛遠同也暫修三乘各別得自乘果故云近異久修三乘人同得無上菩提果故云遠同也問何三乘益云出世益一乘益云出出世益乎答於出世説出世故云出出世也意於三乘出世説一乘出世也問一乘門意初發心位成佛故可云近同何云遠同乎答初發心位中成佛者別教意也今就同教云遠同也又初發心成佛者初發心一念中修滿三無數劫行成佛遠即近近即遠也所以云遠同也問何以法花云近異遠同三乘乎答譬喩品云初以三車誘引諸子然後但與大車寶物莊嚴安隱第一然彼長者無虚妄之咎如來亦復如是無有虚妄初説三乘引導衆生然後但以大乘而度脱云云以是文知爾云事也初引三車誘引諸子初説三乘引導衆生者宅内所授三車即近異也故云倶與大車但以大乘而度脱之者門外露地所授大白牛車即遠同也故云爾也問法花是遮三之一乘也何云近異遠同三乘乎答法花一與三和合説所以有一乘有三乘故云近異遠同三乘也謂爲誘引三乘子依般若深密等經於一佛乘分別説授三因三果各別道理以令得三乘出世益之邊攝三乘諸子等得三乘出世益知一乘根機熟爲説唯一無二會彼行果破彼疑執以令迴入三乘之外一乘之邊攝一乘也問爾以此文相配依本起末攝末歸本二門何答初以三車誘引諸子初説三乘引導衆生者依本起末門也但與大車但以大乘而度脱之者攝末歸本門也謂本者一乘末者三乘也初説三乘者於一乘本以方便分別云説三乘末事也譬如求上分別説波是亦爾也但以大乘而度脱之者藏三乘末歸一乘本云事也譬如藏波説水是亦爾也智度論説譬如一斗米合分三不増減説一乘不失三乘説三乘不失一乘云云已上三種三乘義已了五教者一小乘教二大乘始教三大乘終教四頓教五圓教也小乘教者阿含等經婆沙倶舍等論也爲小乘人説人空法有道理也阿含有四雜阿含中阿含長阿含増一阿含也阿含古梵語也新云阿吸摩也漢云教亦云典云云婆沙者翻廣解云云倶舍者翻藏論大乘始教者深密經中説第二時第三時教也深密經中説初昔今三教即如次初時教第二時教第三時教也初時者阿含教第二時教者般若教第三時教者深密教也今是中取第二時第三時般若深密教大乘始教三時教亦云轉法輪持法輪照法輪即最勝王經所説三時教也般若深密等經未盡大乘至極理故名始教也定性二乘無性有情不成佛説故也法相師問云説定性二乘無性不成佛盡大乘至極理何云未盡極理乎答其三乘始教門分齊耳今一乘宗終教已上意而不爾故云未盡極理也故般若經五百九十三云聲聞乘性決定者聞是法已得自乘無漏智獨覺乘性決定者聞是法已依自乘得出離菩薩乘性決定者聞是法已得無上菩提果云云又解深密經云一向種寂聲聞種姓補特伽羅佛化導而雖被施設種種勇猛精進終坐道場不能令得阿耨菩提云云又瑜伽論云入無餘二乘不墮有情趣不墮非情趣唯有清淨眞如法界云云又同論云聲聞乘性決定人以聲聞乘成熟是獨覺乘性決定人以獨覺乘成熟是菩薩乘性決定人以無上乘成熟是人天乘性決定人以善趣成熟是云云善趣者人天二趣也明知是定性二乘無性有情不成佛云事花嚴論問云定性二乘無性有情不成佛者入無餘二乘經八萬等劫醉臥時又無性有情未轉捨謗大乘因時云不成佛非言畢竟不成佛遇佛菩薩化縁時皆終成佛何法相師如文取義定性二乘無性有情終執不成佛是甚可悲答至下可知大乘終教者法花涅槃無上依等經法花起信無差別寶性佛性等論也是等經論説定性二乘無性有情成佛故法花經云聲聞若菩薩乃至皆成佛無疑云云又云十方佛土中乃至除佛方便説云云又我滅度後復有弟子乃至唯以佛乘而得滅度更無餘乘除諸方便説法云云又涅槃經云一切衆生悉有佛性悉皆當得阿耨菩提云云又云非佛性者謂垣牆瓦石無性之物云云又云須陀洹八萬劫到斯陀含六萬劫到阿那含四萬劫到阿羅漢二萬劫到辟支佛一萬劫到阿耨菩提云云又云須陀洹等八萬等住處云小涅槃無上法主聖王住處云大涅槃云云又楞伽經云樂著三昧樂安住無漏界乃至彼覺法亦然得佛無上身云云又無上依經云入無餘二乘有三種餘一煩惱餘二業餘三果報餘煩惱餘者無明住地業餘者無漏業果報餘者意生身也謂意生身者變易身也意生身亦云意成身又法花論云四種聲聞授記中退菩提心聲聞與應化聲聞此二佛授記決定性聲聞與増上慢聲聞此二根未熟故菩薩與授記令發心云云又云二乘以方便令入涅槃城彼涅槃者謂禪三昧城過彼城已令入大涅槃城故云云又起信論云一切諸佛本所乘故一切菩薩皆乘此法到如來地故云云又云業識根本熏習者一切阿羅漢辟支佛菩薩皆有成滅苦故云云又無差別論同起信論所以更不出本文又寶性論云向説闡提無涅槃性不入涅槃此義何是爲欲顯示謗大乘因故是顯何義爲欲令迴轉誹謗大乘心依無量時作是説實以有清淨性故云云又世親佛性論云一切皆成佛者是了義也一切皆不成者是不了義以是等文知云定性二乘無性有性一切皆成佛事所以終教中引此等教證一切皆成佛也問般若深密等經未盡大乘至極理故攝始教法花涅槃等經盡大乘至極理故攝終教者何章云一切皆空宗謂大乘始教即般若經等是云云又云説三性眞如不空道理故深密等經攝終教云云何共攝始教乎答判始終二教疏章義望小異也謂疏於成佛不成佛門分始終二教所以般若經攝終教深密經攝始教章於空不空分始終二教所以深密經攝終教般若經攝始教所以不相違問何故説空教云始教説不空教云終教答説空教未盡大乘至極理故云始教説不空教盡大乘至極理故云終教問以何知云爾事答法鼓經云以空門爲始教以不空門爲終教云云又章云説一切空經是有餘説唯有此經是無上説非有餘説云云以是等文知云爾事也頓教者維摩思益楞伽等經也對始終二教云頓教也謂始終二教依位地階行次第漸漸修成從微至著名佛所以是云漸教今頓教言説頓絶理性頓顯解行頓成一念不生物名佛所以是云頓教問以何知爾乎答維摩經云淨名以默顯不二云云又思益經云得諸法正性人從一地不至一地云云又楞伽經云初地即八地乃至無所有何有次第云云以是等文知云爾事如鏡中像頓現非漸漸者如掩摩勤菓漸熟非頓云云掩摩勤菓者漢云餘甘之菓圓教者花嚴等經也兼攝教義理事等一切法顯一位即一切位一切位即一位事所以十信滿心攝五位成正覺事云圓教也問此五教者於時節次第立若依機理淺深立不於時節次第立所以疏云不於時事於理立云云問爾花嚴經説圓教者唯説圓教義不説餘始終頓三教乎答約小分云時互皆具今約多分判五教所以疏云限一經判教難云云意約小分皆互具始教終教中爲言非無圓教義言也已上五教已了問花嚴經一大法身盧遮那所説也何云釋迦佛海印三昧乎答今此一乘意而爲顯菩提樹下身即盧遮那佛身云事云爾也所以不相違也問樹下八相成道身盧舍那身周遍法界身也何云同身乎答疏云丈六遍十方絯法界云云又名號品云或名釋迦或名盧遮那云云以是等文云爾也十身者衆生身世間身業報身聲聞身辟支佛身菩薩身如來身智身法身虚空身問釋迦身入諸教門分別四句如何答或化身非報與法是初始教説或報身非化法是約同教一乘及小乘教説或法身非化報是約頓教説或化身亦報法倶有是總約三乘説或非化身亦報法是約圓中別教一乘具十身説問此四句意何答若有衆生堪悟始教大乘見化身釋迦在菩提樹下爲我説深密等始教大乘所以云化身而非報法是約始教説若有衆生堪迴入同教一乘報身釋迦在靈山爲我見説法花一乘復有愚法小乘人見報身釋迦在菩提樹下爲我説阿含等小乘教所以報身而非化法是約同教一乘及小乘説若衆生熟頓悟機堪悟頓教見佛始成道終至涅槃未説一字所以云法身而非化身是約頓教説若有衆生堪悟圓教見十身釋迦在十蓮花藏世界海爲我説花嚴一乘所以云非化身亦報法是約圓中別教一乘説具十身故若有三乘人見娑婆世界樹木等所在化身釋迦爲我説三乘教若有普賢等大菩薩見十蓮花藏世界海衆寶重重無盡菩提樹下在一大法身盧舍那爲我説重重無盡普法一乘所以有化身亦報身是云總約三乘説也問何於一釋迦所説教生解各別乎答譬如四類有情一境水各別見隨所被機感智淺深於一大法身各別見亦爾四類有情人天鬼傍生也一境水人見淨水天見瑠璃鬼見膿河猛火魚見宅路也此中身相攝三種世間者國土身攝器世間衆生身業報身聲聞身辟支佛身菩薩身攝衆生世間如來身智身法身攝智正覺世間虚空身通三種世間以三身攝十身中如來身也問何故攝如來不攝餘智身法身乎答智身唯能證智而不所證理法身唯所證理而不能證智如來身通能證所證所以三身總攝如來身不攝餘智身法身也問三身中何爲能證爲所證乎答約三身中法身有智法身理法身智法身者能證智理法身所證理也應化二身非能證所證假而非實法身是實依法身起應化二身所以云假隨實應化二身總攝如來身所以最勝王經云譬如依空起處依電起光如是由法身現應身由應身現化身云云又般若論云應化非眞如佛亦非説法者説法不二所無説離言相云云以是等知應化攝法身云事問一乘門意而釋迦具十身三種世間一切諸法皆攝盡而何攝非化身亦非報法句答今一乘門意而釋迦具十身故偏非化身偏非報法攝盡一切法故攝非化身亦非報法句故法身章云通攝一切三世間故衆生及機無非佛故一大法身具十佛故三身等並在之中智正覺攝故云云問三種世間攝十身爾十佛攝十身佛其十佛者無著佛願佛業報佛住持佛涅槃佛法界佛眞佛正佛三昧佛如意佛也答攝十身之中智正覺身問三乘門立三身佛何故一乘門立十身佛乎答寄圓數爲顯無盡義故立十身也十身具六相相融故寄圓數顯無盡義其十身六相相融者初一衆生身含後九身是總相也後九身別初一身是別相也後九身同帶初一身是同相也後九身各別是異相也取後九身爲初一身圓滿初一身是成相也開初一身爲後九身離後九身外無別衆生身是壞相也是云十身具六相相融也初一衆生身如具六相後九身亦爾也顯無盡義者初一衆生爲主時後九身爲伴相入初一衆生身其互皆相入互重重無盡也初一衆生身爲主時如云具重重無盡義後九身一一互皆爲主具重重無盡義爾也是十重無盡又約十身有同體門十身異體門十身約此亦有同體門十重無盡異體門十重無盡所以云寄圓數顯無盡義也具如説十玄義六相義中也海印三昧者海印喩名也譬如天帝釋與修羅空中鬪戰時其四兵像印現大海中如來定心海中印現三世諸法所以云海印三昧者法名也梵語也漢云等持離沈浮故云等也令不散心故云持也是理智無二一法界心云海印三昧也故遊心法界記云理智無二交徹容融彼此倶亡能所斯絶名爲三昧云云問定者專注一境不起言詮何云海印三昧一乘教義乎答三乘定一向寂而淺故不起言詮一乘定寂用無礙深故起言詮故云爾也問依眞如起正體智依正體智起後得智依後得智起大悲依大悲云教法流出時可云釋迦佛後得智大悲門一乘教義何海印三昧一乘教義答三乘門意而爾耳今一乘門意不爾所以爲言從海印三昧教法流出云海印三昧一乘教義所以五教云此一乘教必依佛海印三昧出不同三乘依佛後得智出云云教法者以音聲句文爲體也海印三昧者通因定果定佛所得爲果定果人所得菩薩得分定爲因定因人所得故賢首品中説十信位中菩薩行相云一切示現無有餘海印三昧勢力故云云即疏釋此文云譬如閻浮提一切衆生像現大海中菩薩定心亦爾也分明見一切諸法云云問爾何遊心法界記云因定爲花嚴三昧果定名海印三昧云云答彼約因果差別門今約因果不二門所以不違問約定有七種燈第五云一者三摩呬多漢云等引三摩云等呬多云引二者三摩地此云等持三者三摩鉢底此云等至四者散那演那此云靜慮五質多翳迦阿羯羅多此云心一境性質多云心翳迦云一阿羯羅云境多性六奢摩他此云心七現法樂住云云此中以海印三昧可攝何定乎答以義准可配三摩地海印三昧翻等持云云以翻等持漢語同見云三昧與三摩地同梵語也問何等引餘亦爾也答即燈文釋云等引通有無心唯定非散也就勝亦説空無相無願云名三摩地等至者通目有無心定心就勝唯説與五現見等相應諸定名爲等至也靜慮通攝有無心定漏及無漏識與不識依色四地非有餘處諸處據勝多説色地有心清淨功徳名爲靜慮也心一境性者即等持也奢摩他者唯有心淨定不過散位現法樂住有靜慮根本非餘淨也不通散然等引廣通攝一切有無心位諸功徳故所以瑜伽論中偏立地名等地不爾云云問一乘教義者別教歟同教歟答通同別也問爾何別教一乘義乎答十十無盡主伴具足教義云別教也花嚴經中説十法爲主顯無盡義也所以章云如露地牛車自有教義謂十十無盡主伴具足如花嚴經此當別教云云與三乘別故云別教一乘也其一乘三乘有十異者一時異二處異三主異四衆異五所依異六説異七位異八行異九法門異十事異也私略頌云時處主衆依説位行法事也且時異者章云此一乘佛成道要在初時第二七日説猶日出先照高山等論云此法勝故在初時及勝處説云云所以云時異問何故成道初七日不説法答佛成道初七日自受法樂所以初七日不説法也問一乘門意一時中攝一切時何在第二七日説乎答第二七日通攝三世一切前後際所以此第二七日中攝在三世一切時説處異者此一乘要染淨鎔融攝七處八會花嚴世界海中摩羯陀國衆寶樹下而説不同三乘等教在娑婆木樹等處説所以云處異主異者此一乘要十身佛及盡三世間説不同三乘等變化身及受用等説所以云主異衆異者此一乘唯爲普賢等大菩薩説不同爲三乘等聲聞衆説問爾何有舍利弗海幢比丘六千比丘等皆共在第八會乎答此皆權現比丘非實聲聞也所依異者此一乘教起要依佛海印三昧出不同三乘等依佛後得智出之説異者此一乘者一方而説一事一義一品一會等時必通十方一切世界説不同三乘隨一方一會説位異者此一乘所有位相上下皆齊一一位中攝一切位是故乃至佛等諸位有信等位中三乘中即不爾隨當位上下階降皆不相離行異者隨一菩薩即具信等六位一一位中所有定散等差別行相並一時修一行即一切行等通因陀羅等三乘等不爾地上菩薩猶各分齊況地前乎法門異者三乘門中立三身六通三明八解脱四無畏五眼三世四諦四辨十八不共法也一乘門中立十身十通乃至十不共法也事異者隨有舍林地山等事皆是法門或是行或是位或教義等而不懷其事一一塵中皆具足法界一切差別事三乘不同説即空即眞如等依此等異相花嚴一乘云別教也問花嚴一乘別三乘故名別教者愚法小乘亦別三乘故可名別教答愚法小乘亦名別教有何妨所以章云四阿含等亦名別教唯説愚法二乘教故云云已上別教了同教有二種一者一乘同教二者三乘同教也法花經云一乘同教深密經云三乘同教也法花經開説唯一無二三乘人同入一乘故深密經開説三因三果各別道理三乘人各得自乘果倶所被教也云同教有三義一者三乘人倶所得之教故云同教二者一乘同三乘故云同教三者三乘同一乘故云同教也三乘人倶所得之教者一乘教三乘教三乘人同所被之教故名同教也一乘同三乘者於一乘法少分分別令悟三乘人故名同教即是下同教門中云一乘垂三乘也三乘同一乘者三乘法門名説交一乘法門中故名同教言也即是下同教門中云三乘交一乘也問一乘垂三乘三乘垂一乘云意何答三乘中説因陀羅微細等不具足主伴亦説花藏世界不説十等所以一乘垂三乘復十通中説交六通十眼中説交五眼所以三乘交一乘問何故一乘交三乘三乘交一乘答一乘垂三乘者若不用方便直説一乘無盡義彼不信受隨意道所以令熟彼一乘根機漸令彼信受而於一乘以方便小分分別説三乘別相也三乘交一乘者引三乘人入一乘爲令易解故也問見下同教門同教一乘同教二乘同教三乘同教四乘同教五乘同教無量乘唯是可云釋迦佛海印三昧一乘三乘等教義何云但一乘教義答理可云爾而令三乘攝一乘云爾也攝方便故所流故所目故三乘總名一乘也三乘入一乘方便也所以攝方便歸實名一乘所以云攝方便故三乘法從一乘法流出故所以云所流故名一乘三乘法一乘所目故名一乘言也問何故三乘名一乘所目答譬如一切細目被攝一細網三乘教亦所攝一乘教言也問由三藏故一乘三乘無異者何一乘外別立三乘答一乘與三乘無別云外亦別之無別也所以乍有一乘亦三乘也乍有三乘即一乘也譬如水與波水即波波即水也故一乘即三乘三乘即一乘也所以一乘之外別立三乘也水波無異水外如別名波是亦爾也問章文一別教二同教也初中亦有二云云其二者何答初者差別教也意其別教門中有二一性海果分二縁起因分言也問亦何云性海果分答十身如來所知境界之性海果分問爾其十身如來所知境界者體何物乎答唯佛與佛所知教義理事解行因果等法云十身如來所知境界問何爾乎答性者體性也海者甚深義也果者佛也分者分齊也意十身如來所知教義理事等法體性甚深果人所知分齊也果人者即佛也問説此等法何故章文此當不可説義乎答性海果分法者言忘慮絶法也既離權教所以言不可説也答性海果分法金剛已還菩薩不所知即不知爲誰説問何位云金剛已還菩薩答第十地已前菩薩云金剛已前菩薩也此法不相應言教故云不與教相應也言教者聲句文也既不相應聲句文何以説所以言不可説也故章引地論文云因分可説果分不可説云云因分可説者因位行相也果位十佛境界不可説也謂十佛者十身如來即釋迦佛自境界者十身如來自内證境界也問因分可説果分不可説者何章文性海果分縁起因分此二無二全體遍收猶如水波答水與波雖是體一云水云波名既別也亦波淺有分齊水深無分齊故云水波異復波不離水水不離波故云水波體一如此云因云果名既別也亦因淺有分齊果深無分齊所以無別之別故云因與果別而云因分可説果分不可説復別之無別故云因與果無別而云此二無二全體遍收也問何故云縁起因分答普賢等所知境界故也縁者縁淺起者發起因者因人分者分齊也於不可説性海果分法對因位機縁小分起言教説即是因人所得分齊也於教義有十對一教義二理事三解行四因果五人法六分齊境位七師弟法相九主伴依正九隨情根欲示現十順逆體用自在也具如十玄義問普賢者差一人若多人乎答凡解普法人皆總名普賢不一人也問爾何解普法乎答龍女與普莊嚴童子善財童子都率天子等總名普賢問何爾乎答徳普法界故名普准位生善故云賢問何故此別教一乘名普法答一法普遍一切法一切法普入一法中説此圓融道理教故云普法問約普賢有種乎答有二種一者三乘普賢二者一乘普賢也約三乘普賢有三種一者人普賢二者解普賢三者行普賢也約一乘普賢亦爾也人普賢者對三乘門者説乘六牙白象現行者前普賢云人普賢破三乘別執迴入一乘普賢云解普賢法華經普賢品説普賢懺悔行云行普賢也若於一乘門者華嚴入法界品説善財童子所値善知識普賢云人普賢普賢品説普賢六十行云解普賢離世間品説十種普賢心十種普賢願行云行普賢也具如終南太一一山之智嚴孔目説之十地論因分可説果分不可説者非論正文是疏師得意引文也正文者華嚴經十地品云我但説一分文十地論釋云一因分二果分一分者因分也臨果云一分也云云問此文意何答舍那佛加金剛藏菩薩爲地前菩薩令説十地法門我者金剛藏菩薩指自云我意果分言亡慮絶法故我對縁不可説所以除彼因分非言亡慮絶法故我對機縁説云我但一分云云問何云因分十地云果分十地乎答云此疏有五師説且就第五正義説二分十地有兩重釋初釋意於一歡喜等十地有熟實十地隨相十地熟實十地者果分十地隨相十地云因分十地也唯佛所知佛所行十地云熟實十地唯菩薩所知菩薩所行十地云隨相十地問爾者佛所知所行菩薩所知所行十地者體相何物乎答經云不思議佛法復鳥路所依大虚云喩果海説熟實十地也復金剛藏菩薩受大衆請説十地名曰歡喜地離垢地發光地涅槃慧地極勝地現前地遠行地不動地善慧地法雲地云説隨相十地也問爾者大衆請金剛藏菩薩頌文何答經云如渇思冷水如飢思味食如蜂貪好蜜我等如是願聞其露法云云依是頌金剛藏菩薩爲大衆説十地名問因分可説果分不可説云意何答譬鳥空中十歩行臨鳥見時不可云無路相所以相可説所依大虚見時離大虚別不可云有路空所以路空不可説也如此菩薩喩鳥路相喩十地所依大虚喩果海也臨菩薩修行不可言無十地差別所以云因分可説臨所依果海離果海別不可云有十地差別所以云果分不可説也問引云因分可説果分不可説文別教一乘中教義理事等法爲證具因分果分義云事也爾物何引因分十地果分十地證乎答今章引此文意如十地具因分果分義餘教義理事等一切法亦證具因分果分義云事也擧一法證多法所以不相違也問以何知擧一法證多法云事答疏説因分果分義竟經文云此義通一部經中大意云云以是文知云爾事問何以是文可知云爾事答今此華嚴一部經所説教義理事等法皆具因分果分義云也所以知云爾事也已上初重之釋了第二重釋意於歡喜等十地臨妙智正證云果分不可説寄法臨顯地差別立因分可説意者十地位中起正體智證眞如理時能證所證互等平等離相絶言所以云果分不可説也譬如空中鳥路同大虚不可説路相是亦爾也諸菩薩爲令悟十地行相寄立乘法顯十地行相所以云因分可説譬如空中鳥路相可説是亦爾也問寄五乘法顯十地行相事何答初二三地寄人天乘法顯四五地寄聲聞乘法顯第六地寄縁覺乘法顯第七地寄菩薩乘法顯八地已上寄一乘法顯所以云爾也意者初二三地菩薩得檀戒及四禪等法所以寄人天乘顯四五地菩薩得四諦法故寄聲聞乘法顯第六地菩薩得十二因起法故寄縁覺乘法顯第七地菩薩得無生法忍故寄菩薩乘法顯八地已上菩薩得任運自在故寄一乘法顯也問何以爾知乎答疏云寄世間及二乘等寄禪支道品諸諦縁生顯地別云云問章次文此二無二全體互相攝者先此二者何答因分果分云二意因分與果分體無二而互相攝云也問相攝何答且引鳥路喩云者因分不異果分如路空不異大空果分不異因分如大空不異迹空所以云相攝也章文其猶水波者喩也因分果分體無二水喩果分波喩因分也波隨風起有分齊所以喩因分水隨縁不起無分齊所以喩果分也普賢門縁起因分二門者一分相門二該攝門且分相門者此別教一乘別於彼三乘也云云意分別一乘與三乘差別相是分相門意也問何以故分別一乘與三乘乎答臨門三車是三乘教也露地牛車是一乘也問以何知爾乎答章云宅内而所指之門外三車誘引諸子令得出者是三乘教也界外露地所授牛車是一乘教云云宅内者分段三界内也即以諸衆生異熟識爲宅體諸衆生異熟識界趣生所依根本故爲宅體界趣生者界者三界趣者五趣生者四生也意諸衆生異熟識此三界五趣四生中所依根本所以爲宅體也異熟識者第八阿頼耶識也異因熟果云異熟識也阿頼耶識梵語也此云無沒持諸法種子令不隱沒所以云無沒識也異因熟果者因善惡而果無記也所以云異因熟果也因善惡而果無記者云此有三類一異時而熟二異類而熟三變異而熟由此三義故云因善惡果無記也宅主喩佛也譬如世國王四海爲宅光宅天下佛亦如是以諸衆生爲其宅所以宅喩諸衆生異熟識宅主喩佛問何以知佛以諸衆生爲其宅云事答經曰今此三界皆是我有其中衆生悉是吾子云云以此文智云爾事問門外者何物乎答三乘教行云門三乘理果云外教行出三界火宅所以云門理果出因中所以云外火者煩惱隨煩惱也問慈恩大師御心宅内門外之事爾也智周法師心何答智周法師意三界爲門三乘無漏智爲外也問三乘教行爲門三乘理果爲外云事可然何可云三界爲門三乘無漏智爲外答既經三車在門外云云又我此所燒門安隱得出云云三乘教行爲門者何云所燒門若三乘教行爲門者三乘教行非爲煩惱火所燒者何云所燒門所以云三界爲門三乘無漏智爲外問若爾師資義相違何和會答慈恩御意此法華經佛在世時猶多怨嫉況滅度後云云由此文三乘教行爲門三乘理果爲外意云爲怨嫉火所燒非言爲煩惱火所燒師資各擧一義所以不相違也問然智周法師意三界爲宅者三界即宅宅體與門有何異答云宅即門有何妨譬如世人總宅云門所以攝釋曰此義有甚深云云意譬如世人數宅時不言若干宅云若干門是文爾也問若爾指何位云宅内門外答就玄賛意者地前及具縛位未斷分別二障種子未出繋業三界所以云宅内初地已上斷分別二障種子出繋業三界得無漏智果所以云門外也問分別二障者何答約煩惱障與所知障各有分別倶生并分別煩惱障分別所知障云爾也問約分別煩惱障倶生煩惱障有現行種子習氣何位而伏斷之乎答現行資糧位漸伏至加行位伏愚種子入初地見道無漏智起斷習氣至金剛位除資糧位者地前位中四十心位即十信十住十行十迴向也加行位者地前位中四善根也即煗頂忍世第一法也金剛心者十地中第十地也貪等十煩惱之分別煩惱障倶生煩惱障也問爾此十煩惱者幾分別幾倶生答頌曰疑及後三唯分別諸餘煩惱通倶生云云十煩惱中疑邪見見取見戒禁取見唯分別惑貪嗔癡薩迦耶見邊見通分別倶生言也問二乘人約二障伏斷除乎答伏斷煩惱障現行種子耳習氣菩薩至第十地乃除況二乘畢竟難斷但至迴心向大位乃除習氣問以何知二乘人未除習氣云事答畢陵伽婆差如罵恒河神舍利弗袈裟下鳩如生恐怖皆是未除習氣故也畢陵伽婆差者此翻習氣也問何位捨分段而得變易答入初地時捨分段身得變易所以約菩薩初地已上云門外地前位云宅内也問約菩薩有智増上菩薩悲増上菩薩七地已還位故得分段身何故入初地捨分段身云得變易身答入初地時捨分段身得變易身者約智増上菩薩云非據悲増上菩薩所以不相違一切菩薩必入初地時捨分段身得變易身而悲増菩薩利生悲願深故故留第六相應倶生煩惱障現行爲利生七地已還位故得分段身智増上菩薩不然所以入初地時捨分段身云得變易身悲増上菩薩至第八地捨分段身得變易智度論云菩薩住第八地乃捨蟲身云云蟲身者分段身也既住第八捨蟲身云云明知悲増上菩薩第八地捨分段身得變易身云事分段身中有八萬戸蟲一一各具九億眷屬諸蟲所雜居故分段身云蟲身也彼蟲内口外尾住諸髮毛皆其蟲尾也問若悲増上菩薩入初地時無得變易道理乎答得意云得可得變易身何者爲利生故留煩惱雖得分段身爲彼煩惱無被繋縛所以云或入初地時捨分段得變易身有何妨問約菩薩十地各有三位謂入心住心滿心也是中何位而斷種子何位而除習氣答初地入心有無間道解脱道無間道斷種子解脱道除習氣亦無間道遠塵解脱道離垢復無間道斷惑解脱道證理問習氣有干第十地爾何初入心解脱道時除云答其約小分云非據多分於多分至第十地除愚習氣也問菩薩皆住聖位乎答非然約菩薩地前及倶縛位云凡夫入初地時乃云聖位問爾約菩薩云宅内門外事爾也約二乘何位云宅内門外答前三果及七方便位云宅内第四果云門外未斷煩惱障種子所以云宅内得第四果時乃斷愚煩惱種子所以云門外已上就玄賛意辨宅内外了問宗意何位云宅内門外乎答終教已上宗意而初發心住以上位云門外十信已前位云宅内也問何爾乎答宗意入初發心住已上位菩薩發無漏智出繋業三界得見眞如故也十信以前不然所以云宅内故起信論云菩薩發是心故即得見於法身云云又曰非業繋以有大願自在力故云云以此等文知小分見法身也宗意不立分別倶生惑唯立正使習氣意約煩惱障正使習氣於所知障亦爾也故章云其菩薩人於二障中不分倶生分別但有正使及習氣云云約正使有現行使種子使現行地前位伏種子使初地而斷習氣地上位除之故章曰地前伏使現初地斷使種地上除習氣佛地究竟淨云云宗意約二乘初果以上位云門外七方便以前位云宅内初果以上位於繋業三界得出世益故問初果已上未斷愚三界煩惱何云門外答初果已上斷三界分別煩惱得出世益得出世聖果故更不墮凡夫地所以是云門外也問終教以上宗意何位捨分段身得變易身乎答一切菩薩皆入初地時捨分段身得變易問一切菩薩皆初地得變易身者何悲増上菩薩七地已還得分段身乎答其始教麁宗故爾耳今宗意不爾皆入初地受變易身也問諸聖教中智増上菩薩畏煩惱障故入初地時受變易身悲増上菩薩不畏煩惱障故爲利生故留煩惱障七地已還位受分段身云事定而何入初地時受變易身者始教麁義初地已上位受分段身終教細義乎答智増上菩薩可智勝悲劣悲増上菩薩可悲勝智劣悲與智齊不可増上況以劣智導悲名増上乎入初地時受變易身初地已上位受分段身云事終教宗細始教宗麁云事爲顯爾云也約智増上菩薩不分分段變易二位所以不相違問何以知爾云事答章曰當知由此始終二教麁細異故有二生死不由悲智互増上云云以此文知爾云事也問何云分段變易等乎答法相宗釋云分者支分段者段段也五蘊身分分段段故云分段身也三論宗釋云色形區別受形長短云分段身也問何云變易乎答變者改變義易者轉易義也意改變轉易分段麁身云成光明殊勝細身而云變易身也問變易者新人名歟答倶新古名通也但古人變易云意生身新人云意成身且古人云意生身者意者第六意識也意如意生故曰意生身言也意具三義速疾義無礙義遍到義也如具意此三義變易身亦然也具三義生意成身者意生身云時捨分段麁身別生變易細身樣也今依大願悲願意願力修練分段麁身爲變易身所以由意願力變易身者云意成也可見唯識論第七并同論疏第七也問分段變易二種生死經論説文如何乎答勝鬘經説曰愛取爲縁有漏業爲因如感三有無明住地爲縁無漏業爲因感變易身云云又唯識論云一分段生死謂諸有漏善不善業由煩惱障縁助勢力所感三界麁異熟果身命短長隨因縁力有定齊限故名分段二不思議變易生死謂諸無漏有分別業由所知障縁助勢力所感殊勝細異熟果由悲願力改轉身命無定齊限故名變易或名意成身隨意願成故云云如此經論説文非一尋釋可知也問凡菩薩二乘得變易身事修練分段麁身成變易細身若捨分段麁身得變易身乎答云此自他宗意異且就他宗意者修練分段麁身云得變易細身今終教已上宗意而分段變易二身從本立有之非修練分段麁身得變易身問爾者一切有情身中皆在變易身乎答爾也問就他宗意三界之中何界而修練分段麁身成變易細身答且約頓悟悲増上菩薩云者入第八地時生色界廣果天以其天身成變易細身諸天身中其天身極微細所以以其天身成變易細身也問何爲縁何爲因感變易身乎答勝鬘經云愛取爲縁有漏業爲因如感三有無明住地爲縁無漏業爲因感變易身云云意如凡夫人和合因縁得分段身聖亦爾也因縁和合得變易身也謂如凡夫人愛取煩惱爲縁善不善有漏業爲因感三界五趣分段果聖亦然後得智有分別無漏業爲因無明住地法執所知障爲縁感得變易身言也問何感得乎答依所知障力起眞如意有我必證有情實有我必度云大願悲願由其悲願力故以後得智定願力助有漏古業感得變易身言也所以唯識論第七曰不執菩薩有情實有無由發起猛利悲願問慈恩香象二師變易身義爲同爲異乎答慈恩御心修練分段身云成變易身今五教師御意分段變易二身從本並云有也問爾一切有情皆在變易身乎答爾也問爾一切凡夫位皆得變易身何云入初地時得變易身乎答分段變易二身雖有從本被覆隱分段麁身而不顯菩薩入初地時捨分段麁身故顯變易細身所以不云凡夫位得變易身也問何捨麁身得細身乎答起信論疏云然此細苦無始來有但爲簡細異麁故約已離麁苦時相顯所説云云問何故變易身云細苦乎答變易身有微細生滅苦故云細苦也問其微細生滅苦者如何答此身有刹那生滅義故云爾也刹那刹那前滅後生云刹那生滅身此刹那生滅身佛菩薩所知也非凡夫所知也問宗意何物爲縁何物爲因云感變易生死答勝鬘經曰愛取爲縁有漏業爲因如感三有無明住地爲縁無漏業爲因感變易生死云云問云無明住地云無漏業者體何物乎答無明住地者根本無明熏眞如眞如受無明熏成變二種生死所以云根本無明爲縁無漏業爲因感變易生死也問何知以根本無明熏眞如成變二種生死云事答經曰無明力最大能動一法界轉成二生死云云又起信論云業識根本熏習者聲聞辟支佛一切菩薩生滅苦故云云以此等文知云爾也問宗意變易身義云何釋乎答變易者遷變微細生滅苦故云變易身故無差別論疏曰因位無漏所感之身細患所遷故云變易云云楞伽經三種意生身者一三摩鉢底意生身二覺法自性意生身三種類倶生無作行意生身也可勘攝釋第四也無上依經四種變易生死者一方便生死二因縁生死三有有生死四無有生死也可勘燈第六也問且何云三摩鉢底意生身等乎答攝釋第三引四卷楞伽經第三云三摩鉢底者此翻等至於定得變易身隨心生故云意生身覺法自性意生身者能觀察覺了有爲幻法無實體於定得變易身彼隨意生所以云意生身種類倶生無作行意生身者諸衆生所有隨多類煩惱能現同類身所以云種類種類身一時現所以云倶生能任運起不假功用所以云無作行彼隨意生所以云意生身也問爾此三種意生身攝十地事如何答三摩鉢底意生身有前五地覺法自性意生身有六七二地種類倶生無作行意生身有第八地云云無漏後得智云方便生死所知障云因縁生死變易五蘊云有有生死於行苦細有説有名故云有有變易身唯有微細生滅有從是外更無有云物所以云無有也問爾此四種生死相配十地事如何答方便生死有初二三地因縁生死有四五六地有有生死在七八九地無有生死有第十地云云問爾此四種生死相配十地事正義歟不正義歟答是不正義也所以燈第六判云隋唐攝論并無文云云又無上依經及寶性論亦不配十地如是相配是有師義也云云問臨門三車何以爲體乎答牛車以法空正體智爲牛體以法空後得智爲車體依正體智後得智起譬如有前牛後車所以玄賛曰無分別智導種智車義如前牛非正車體云云問何故正體智云無分別後得智云種智乎答無分別情量而證眞如所以云無分別智後得智諸法種數委分別知所以云種智故佛地論云眞縁義邊正體智依縁義邊後得智云云問羊鹿二車以何爲體答以生空正體智爲羊鹿體以有漏假解智爲二車體玄賛曰以二乘所得生空無漏智唯爲羊鹿體指二乘所得有漏假解智世間三昧稱二車體云云二乘人無學果位解脱道時起無漏正體智證生空理解脱道之後出世間定已時起有漏解假智分別諸法所以生空正體智爲羊鹿之體有漏假解智爲二車體起生空正體智後起有漏假解智如羊鹿在前二車在後故喩云也問約菩薩准以法空正體智爲牛體以法空後得智爲車體於二乘亦以生空正體智爲羊鹿體以生空後得智可二車體然何以有漏假解智爲二車體乎答生空後得智者二乘人既得畢而經文二乘子到門外不得車云云何既得了之生空後得智云爲二車體所以以有漏假解智云爲二車體也問有漏假解智二乘人亦得而經文二乘子到門外云不得車爾物何有漏假解智云爲二車體答假解智非種智故喩車也此假解智分別諸法非如無漏種智所以云非種智問車喩種智然有漏解智非種智者何爲二車體答假解智似種智非實種智所以以似種智喩二車以非實種智喩二乘子不得車決釋記云譬如黄葉似金非實金有漏假解智似種智非實種智云云問以生空無漏後得智不爲二車體者何經文云乘是三乘以無漏根力覺禪定解脱三昧而自娯樂不云乘是三乘以有漏假解智等乎答云此決有二釋一者謂彼車莊嚴具非正車體云云二十一一謂得無智人身中中所有有漏假解智故云無漏根力非生無漏之後得智云云初車莊嚴具者無漏根力者非言車體無漏於有漏車以無漏莊嚴飾也問何故羊喩聲聞人車喩聲聞乘鹿喩獨覺人車喩獨覺乘牛喩菩薩車喩菩薩乘乎答云此有五義一者有形貌大小二有飡受小多三有渡水淺深四有力用強弱五有依處喧靜由此故三乘如次喩三獸也有形貌大小者羊其體最小鹿其體中庸牛其體最大也約噉物羊少噉鹿中噉牛多噉渡水淺深者羊浮渡鹿中踏底渡力用強劣者羊最劣鹿中牛最勝依處喧靜者羊多處人邊喧鹿多處林野靜牛通喧靜有屓運二恩也據喩約法者京性根業證理斷惑行能此五如次喩先五聲聞根性最劣獨覺根性中庸菩薩根性最勝也所以喩三獸形貌大小聲聞所被教最劣獨覺所被教中菩薩所被最多喩敢受多少聲聞所證理最淺獨覺所證理中菩薩所證理最深喩渡水淺深聲聞斷惑智力最劣獨覺中菩薩勝喩力用強劣聲聞一向隨師伴縁受教獨覺處山林靜念道菩薩通二有自利利他用喩依處喧靜也問何故以大白牛車喩一乘乎答譬如白色爲諸色中根本爲顯一乘諸乘中在根本以白牛喩一乘經文曰飾白拂曰蓮云白蓮華明知以白牛喩一乘云事大白牛車喩三乘之外一佛乘相應三種大七種大性故云大無爲淨潔離諸結縛故云白也三種大者體大相大用大也七種大性者境大性行大性智大性精進大性方便善巧大性證得大性果大性也且體大者眞如理性廣大甚深爲一切染淨法平等所依體性而不増減不増減者眞如隨無明縁成變生死染法不増生死不滅眞如又眞如息生死妄想爲始覺淨法不増眞如不減生死生死相大者起信論曰如來藏具足無量性功徳故云云性功徳者大智慧光明義遍照法界義常樂我淨義清淨不遍自在等義如是無量恒河沙等功徳也問何云恒沙功徳何云性功徳乎答眞如上無量功徳不相離眞如體性如水八徳不相離水也水八徳者可考稱讃佛立經文也用大者起信論曰眞如用能生一切世間出世間善因果故云云報身細用化身麁用云眞如用也導衆生令生世間善因果云化身麁用導衆生令生出世間善因果云報身細用也報化二身麁細用能令生世間出世間善因果故云隨縁幻差別隨衆生染心不異體性故云業染幻差別意報化二身麁細體用假幻有言也體者業染幻差別也用者隨縁幻差別也地前位有漏智因果云世間善因果也地上位無漏智因果云出世間善因果也此三大中體相大爲内熏因用大外熏縁也此三大自宗義非他宗心也委細在起信論并疏可披見也七種大性者對法論云百千等無量諸經廣大教法名境大性云云謂菩薩縁是等教法爲境界修唯識六度等行成佛故也行大性者自利利他廣大行也智大性者菩薩能得觀一切補特伽羅與法廣大無我理智也精進大性者菩薩三大僧祇中修廣大難行苦行也方便善巧大性者菩薩智與悲相導不住涅槃不住生死故名方便善巧大智故不住生死大悲故不住涅槃也證得大性者佛果位也謂證得十力四無畏十八不共等無量功徳故也果大性者佛果位也謂示現衆生成菩提建立廣大佛事也初五因後二果也此七種大性可考對法論也問章文云四衢別授大白牛車爲示眞實相者其四衢者何答四衢者四交道也即交者巷也道者遊履義也約法喩四諦理苦集滅道是云四諦理也生死果云苦諦生死因爲集諦涅槃果曰滅諦涅槃因云道諦三乘人同觀四諦理至露地故喩四衢所以大般若經云四諦理喩四衢道云云問四諦理是聲聞人所觀法也何三乘倶觀乎答別聲聞人通三乘人倶觀也謂縁覺觀十二因縁起法四諦道理菩薩觀三性三無性唯識六度等法四諦道理各於自乘法觀所以三乘人倶觀四諦理也問宗意臨門三車以何爲體乎答以三乘教義爲體聲聞乘教義爲羊車體獨覺乘教義爲鹿車體菩薩乘教義爲牛車體問何云教義乎答章云界内示爲教令得出爲義云云問指教差何經喩臨門三車乎答深密經瑜伽論所説教義喩臨門三車問何故三乘教義喩三車乎答三乘人各依三乘教義出分段宅得出世益故三乘教義喩三車謂聲聞種性人依聲聞乘教修彼出分段宅得出世聖果乃至菩薩乘人依菩薩乘教出分段宅得出世果所以三乘教義喩三車也義者出分段宅所以也問運載義爲車體三乘教義無運載義何云車體乎答三乘教義有運載義所以爲車體問教者能詮教義者所詮理何云運載義有乎答佛初成道爲二乘人説四諦縁生教二乘人依此修出三界得出世聖果故有運載義也問三乘子出家時乘車出若不乘車出乎答乘車出也問若爾者何經文云三車在門外不云乘車出答約車有教車義車宅内乘者教車在門外者義車也故不相違露地大白牛車者喩三乘云外一乘也是同教別教二一乘也別教一乘者十十無盡而主伴具足教義云別教一乘教義也十玄法云十十無盡也其十玄法者一教義二理事三解行四因果五人法六分齊境位七師弟法智八主伴依正九隨情根欲十逆順體用自在等也約此十玄法有主徳伴徳主徳喩白牛伴徳喩車縁起主徳引縁起伴徳如牛引車故也教義一法云主徳理事等多法主伴徳理事等多法云主時教義一法爲伴互主伴而重重無盡此云十十無盡而主伴具足教義故經云我有如是七寶大車其數無量云云章釋此文曰有無量寶事非只一是顯一乘無盡教義云云又曰如露地牛車自有教義謂十十無盡主伴具足云云以此文知十十無盡而主伴具足教義爲大白牛車體以運載義云乘云車於此運載有二一次第運之運載謂三乘門也三運即一切運之運載一乘門也三乘門運載者始運到十信次轉至十住如是乃至佛果次第運登彼岸故一乘門運載者一位即一切位而初發心住位麁取後後諸行成佛故也三乘之乘云可思議乘一乘之乘云不思議三乘之乘三賢十地中次第運成佛故云可思議乘一乘之乘一位運位即一切位運成佛故云不思議乘也花嚴經賢首品云此經爲乘不思議乘菩薩説云云以此文知一乘之乘云名不思議乘也同教一乘者以本覺智爲白牛體以始覺智爲車體本覺正智引始覺圓智如牛引車也問以何知本覺正智爲白牛以始覺圓智車體云事答起信論云一切諸佛本所乘故一切菩薩皆乘此法到如來地故云云問界外露地者指何位云露地答云此始終二教意別也就終教心者約二乘預流果已上位云露地約菩薩初發心住已上位云露地露者無壅障云事意二乘人預流果已上位斷三界分別煩惱障一分證生空理故無分別煩惱障壅所以預流果已上位云露地約菩薩初發心住已上位起無漏智乎分得見眞如故無煩惱障壅所以云露地也就始教約二乘人第四果云露地於菩薩初地已上位云露地二乘人得第四果時斷三界煩惱出繋業三界得有餘涅槃故第四果云露地菩薩者初地已上位斷分別二障出分段生死得無漏智故初地已上位云露地問於分段三界有繋業三界果報三界何所而出離答若就終教意者據二乘預流果已上位出繋業三界第四果位出果報三界據菩薩初發心已上位出繋業三界初地已上位出離果報三界約始教准露可知之問一乘與三乘異事有幾門乎答有十差別門一者權實差別具出如章且權實差別者權者三乘教實者一乘教也依此明一乘與三乘差別是門意也三乘教於一乘教分別説故云權教一乘實教也問羊鹿云權可然何三之中牛車可云權乎答同羊倶不得故云此有二義一約事同二乘雖出三界外未得佛果故二於教同二乘教許有實滅故倶不得故初義意三乘菩薩初發心住已上位出繋業三界雖得出世益未得出出世益二乘人初果已上位雖得出世益同未得出出世益所以云同羊鹿共不得也後義心實滅者定性二乘無餘涅槃也意深密等三乘教中説定性二乘入無餘涅槃果不可成佛同説小乘教中二乘人阿羅漢爲極果更不成佛所以許有實滅也問同二乘説有實滅故深密等三乘教名權者宗意説定性二乘成佛爲當何答終教已上宗意而定性二乘人入無餘涅槃從彼出迴心向大必定之成佛問何爾乎答入無餘二乘灰身滅智不成佛者滅分段麁身智不滅變易細身智故成佛也無上依經佛性寶性等論同四入無餘二乘有三種餘一煩惱餘謂無明住地二乘餘謂無漏業三果報餘謂意生身意生身者變易身也云云又法花論云入無餘二乘人以方便令入涅槃城故彼涅槃城者謂初禪三昧城過彼城已令入大涅槃城故云云明知二乘涅槃方便涅槃非實涅槃實二乘自彼出迴心向大也此等文意者入無餘二乘有三乘種餘者無明住地爲縁無漏業爲因得變身言也令入涅槃城者令入無餘涅槃云事也令入大涅槃城者令佛果大涅槃城云事也法相師云無上依經法花論意云入無餘不定種性二乘人從彼出迴心向大得變易身成佛也非定性二乘爾何證定性二乘成佛云事文乎答花嚴師云若爾者終違諸教也問何違乎答密嚴經云涅槃若滅壞衆生有終盡衆生有終亦是有初際應有非生法而始作衆生云云又龍樹發菩提心論云有定性者難可發生要待劫限等滿方乃發生云云違此等文問如是教文如何和會云定性二乘不成佛乎法相師答云是等文翻譯過非論主本意也問入無餘二乘灰身滅智故唯有清淨眞如法界有何物迴心向大可云成佛乎若入無餘二乘滅分段麁身智不滅變易細身智云物者能持第八識滅即所持身倶滅有何物可持變易答根本無明所動三細阿羅耶識持變易身也三細者業識轉識現識此云三細阿羅耶識業識者若無明和合眞如令微動眞如義邊云業識是識極微細唯佛與佛境界非金剛已還菩薩所知無明熏先業識心令向能見義邊云轉識無明熏先轉識心令妄現境界義邊云現識業轉二識持變易身現識一麁阿羅耶識持分段身所以入無餘時現識麁阿羅耶識滅業轉二阿羅耶識不滅所以云出無餘成佛也二乘人依四因出無餘成佛一者二法成識因二者二不斷證因三者涅槃不實因四者化城有過因也章云根本無明動如來藏成羅耶識故彼二乘人於此二法未斷證故彼未斷證所謂涅槃豈爲究竟化城同喩應則有失云云文意者根本無明動如來藏爲阿羅耶識故者無始無明熏動眞如爲阿羅耶識由此故二乘入無餘時現識麁阿羅耶識滅業轉二細阿羅耶識不滅所以從無餘出迴心向大三無數却中修六度等行成佛也云云彼二乘人於此二法未斷證故者此二法無始無明與眞如云二法彼無餘二乘無始無明未斷眞如證故從無餘出斷無始無明證眞如畢成佛云也所謂涅槃豈爲究竟者斷盡無始無明證眞如畢成佛時所得涅槃云究竟涅槃無餘二乘無始無明未斷盡眞如未證畢但滅分段麁身所得滅盡定上我謂得實涅槃所以其無餘二乘所謂涅槃豈爲究竟自無餘出乃得實大涅槃故言也化城同喩應有失者化城云物爲息衆人中路所化作城也二乘無餘喩化城若二乘無餘實涅槃者法實而喩假所以不成化城同喩言也問三乘與一實權實既別何總三乘名一乘乎答文云以隨本宗定故云云意三乘一乘本宗所流所目方便云事定故總三乘名一乘云也問總三乘名一乘者名同教一乘名別教一乘乎答名同教一乘不名別教一乘所以章云是同非別云云又孔目第一云非即圓通義云云問何故不名別教乎答章云主伴不具足故云云問主伴不具故名同教一乘不名別教一乘者同教中不説無盡義乎答爾也不説問爾何十重唯識章云帝網無礙故説唯識總具十重約同教説乎既帝網無礙唯識約同教説云云何今云同教中不説無盡義答新羅珍宗記云同字謬也可作圓字云云意可云約圓教説不可云約同教説云也問調度文爾先徳傳而何可云答若就先徳傳者疏文謬者是惡得本疏心何者同教中小分説帝網無礙義所以疏文謬者是非然云云十重唯識者一相見倶存故説唯識二攝相歸見故説唯識三攝數歸王故説唯識四以末歸本故説唯識五攝相歸性故説唯識六轉眞成事故説唯識七理事倶存故説唯識八融事相入故説唯識九全事相即故説唯識十帝網無礙故説唯識是云十重唯識初三重約始教説次四重約終教頓教説後三重約圓中別教總具十門約同教説云云問文云若望自宗並皆得果云意何答三乘人依三乘教各得出世益所以望自宗三乘各各自分宗也並皆得果云云問二乘人出分段生死得阿羅漢果故聖自宗並皆得果云事可然約菩薩未得摩醯首羅智處城佛果何云望自宗並皆得果答菩薩雖未得彼果初發心已上位起無漏智出分段生死得出世益故少分得見法身故分八相成道故三乘出世益既究竟故云爾也問三乘人聖自宗並皆得果者三子到門外可得車何以未得車三子詣父所共索車乎答章云今言倶不得者以聖一乘故意三乘人依三乘教出分段繋業雖得自宗出世益未得一乘究竟果故云三乘倶不得也所以章文以實映權方便相盡故皆無得云云實者一乘法權者二乘法也知三乘從本以來不異一乘故離一乘別無三乘所以云實映權也問爲欲迴彼二乘人入一乘故大乘亦説迴者此文意何答此文意顯迴三乘人同入三外一乘文也問約三外一乘有同教一乘別教一乘是中何迴入答倶迴入章文云或有衆生此世三乘根不定故堪進同教一乘者則見自所得三乘之法皆依一乘無盡教起是彼方便阿含施設是説迴入同教一乘也或有衆生於三乘法根不定故堪可進入別教一乘者即知彼三乘等法本來不異別教一乘是説進入別教一乘也問於三乘若有迴入同教一乘三乘迴入別教一乘三乘別答不爾三乘人必先迴入同教一乘然後迴入別教一乘問若爾何章文云或有衆生迴入同教或有衆生迴入別教乎以此文見別迴入同教一乘三乘迴入別教一乘三乘答此文意顯三乘人從淺至于深識往次第非有彼別問若爾菩薩二乘必先迴入同教一乘然後迴入別教一乘乎答不爾二乘教先迴入共教大乘捨二乘名得菩薩稱然後迴入同教一乘迴入別教一乘菩薩從自所得共教大乘迴入同教然後進入別教一乘所以廣疏第一説傳爲云謂諸二乘以根鈍故要先迴入共教大乘捨二乘名得菩薩稱然後方入此普賢法共教大乘者般若深密等也問宅内所授牛車與門外所授牛車有何差別答其意玄別宅内而指外時云門外在牛車不擧餘徳門外露地而授時有大白牛肥壯多力等云所以別也問定性二乘人從無餘出迴心向大若共教大乘歟若不共大乘歟答不共大乘也非共教大乘定性二乘以無餘簡擇力知三之中大乘權三之外一乘實故迴入不共非共教也問入無餘二乘樂著三昧都無覺知何得知三中大乘權三外一乘實乎答由如來大悲別縁力故有彼本覺内熏力因故自無餘出得知爾也問若爾何疏云謂諸二乘以根鈍故要先迴入共教大乘乎答彼約不定種姓爾云不據定性二乘問以何知乎答智度論九十三云阿羅漢捨分段身生何地具足佛道有妙淨土出三界外阿羅漢彼聞法花經具足佛道云云又樣云定性二乘不定種性必先迴入共教大乘然後迴入不共大乘故疏云謂諸二乘等云云問何故不云阿羅漢生妙淨土聞深密經具足佛道云聞法花經具足答本阿羅漢身人故云阿羅漢實共教大乘菩薩所以云聞法花經具足佛道也問迴三乘入一乘者三乘因果若歸一乘因若歸一乘果答三乘因果總歸一乘圓果不歸一乘因問若爾菩薩因果二乘因果共歸一乘圓果乎答不能菩薩因果歸一乘圓果二乘因果歸共教大乘因問爾何三乘因果總歸一乘圓果乎答彼總云事非言二乘因果歸三外一乘因果也問何故菩薩因果歸一乘圓果二乘因果歸大乘因答菩薩因果於三外一乘果分別故歸一乘圓果二乘因果於三中大乘因分別故歸大乘因也問小乘人中爲得菩提樹下佛身修願行菩薩因果歸一乘圓果若歸大乘因乎答是彼歸大乘因問何歸乎答同二乘未得果故歸大乘因所以般若經云聲聞縁覺若智若斷皆是菩薩無生法忍云云智者二乘人因智也斷者二乘人斷果也無生法忍者菩薩因地名也意二乘人因智斷果云得菩薩因無法忍也斷煩惱障所得果故云斷果也無生忍有三種一相無生忍二生無生忍三滅苦無生忍也新人云無起法忍古人云無生法忍觀遍計所執從本體相都無智云相無生忍依他法觀無從本自然生智云生無生忍觀圓成實性從本無滅苦智云滅苦無生忍也亦云勝義無生忍也問爲得摩醯首羅智處佛果修願行菩薩因若歸大乘因若歸一乘圓果答歸三外一乘圓果同二乘未得佛果故歸三外一乘圓果問所謂三中大乘因於摩醯首羅智處而成自受用身如來因果從是外更無實相佛何云歸三外一乘圓果答其始教分齊而爾耳人終教已上宗意摩醯首羅智處佛身化相身非實身佛所以云歸三外一乘因果問摩醯首羅智處佛身化相身如何答於三種世間圓滿十身無盡一大法身分別所以云化相身故起信論云又是菩薩功徳成滿於色究竟處示一切世間最高大身云云既云示最高大身所以云摩醯首羅智處而成佛化相身非實身佛問爾終教已上意何處成佛云實身佛乎答章下文云色頂之身非實報佛西方去此三十二恒河沙佛土有世界無勝是釋迦實報淨土云云就圓教意者實身淨土遍法界有即三種世間圓滿十身盧舍那淨土也問何摩醯首羅智處云色頂答摩醯首羅翻云在大自在天彼有色界頂故云色頂問約色頂有五淨居無煩天無熱天善見天善現天色究竟天也此中第五色究竟天在摩醯首羅智處而淨居不見不到彼故云智處也云智處廣疏有四種釋可考見也問此身者依深密等經瑜伽論修滿十地成佛非實身佛答由共教大乘成佛非實身佛因三外不共一乘行成佛爲實身佛所以廣疏第一云離此普法更無餘路得成佛故云云問文若不爾者彼求牛人既出界外不同凡夫非求羊鹿不同二乘未得露地大白牛車不同一乘若非三中大乘更是何色人者此文意何答三中共教大乘菩薩與三乘不共一乘菩薩涅槃也若三中共教大乘菩薩非三外不共一乘菩薩若不爾云者既有三不同故不名三中大乘更是有何色人云也三不同者一退不同凡夫二進不同二乘三未入三外一乘故不同一乘是云三不同也三中共教大乘菩薩發心住已上位出繋三界得出世益故退不同凡夫但求大乘果不求二乘果故進不得二乘云也梁攝論云十解已上位得出世淨心云云意出世淨心者不同世間凡夫云也十解以上位菩薩不隨二乘地所以云進不同二乘十解已上位者即四十心中十住位也問章文云至自位究竟處故後皆進入別教一乘者此文意何答三乘人共到出世間自位究竟處以熟一乘根機進入三外一乘云也問何位云自位究竟處答且約三中菩薩者三賢位云自位究竟處問何爾乎答廣疏第十六云問是等不信何位菩薩答文無正斷准其劫數十千既過僧祇未滿三賢位人云云文意十千劫中修滿十信行到十住位三賢中修滿初阿僧祇行到初地而花嚴説經性起品云三乘菩薩無量億那由他劫修行六波羅蜜修習道品善根不聞不信是經云云既云無量億那由他劫不云十千所以云十千既過復不言阿僧祇劫所以云僧祇未滿也問三中菩薩何位迴入三外別教一乘乎答到極三賢位迴入別教所以性起品疏云三中菩薩到極三賢位必定進入此一乘法終無證地而不信此云云問爾何廣疏第一説引爲而云共教菩薩於彼教中多時長譽深解窮徹行布教源即當得此普賢法界既窮徹行布教源即云當得此普賢法界者依三乘教修滿三無數劫行三乘中而成佛者更迴入三外別教一乘成一乘佛云事答不爾三乘菩薩到自位究竟處以根機熟解三乘教源權過迴入三外別教一乘云也非謂由三乘教成三乘佛人更迴入別教成一乘佛也問非依三乘教成佛人更復迴入別教一乘言者何香象問答云三乘極爲佛而還入一乘乎答云此先徳云云不同也或古徳云非是五教師言不可依或古徳云此五教師云也但破文意讀云云問爾其破文何可讀乎答三乘極爲佛而還入一乘可讀也問爾讀意何答三乘菩薩起一乘行解悟三乘教權往至于佛果位而迴入別教一乘云事也非謂依三乘教成佛人更亦迴入別教一乘成佛也問三乘菩薩起一乘行解悟三乘教權已迴入別教一乘何位成佛答到三外一乘初發心位成佛所以玄門云譬如衆流海入一諦纔稱周大海無始無終餘江河水深不及入海一諦三乘教中逕多劫修行不曁一乘一念行云云文云善財童子求善知識過一百一十城不如一念頂見普賢菩薩云云約此善知識且約位有五十四位據人者五十五人於分者有五分問其五分者何答一寄位修行相二會縁入實相三攝徳成因相四智照無二相五顯因廣大相也問爾此五分相攝五十四位何答寄位修行相有四十一位會縁入實相在十位攝徳成因相智照無二相顯因廣大相各有一位也且寄位四十一者十住十行十迴行十地是爲四十也十信合爲一所以云四十一也問約人者寄位有三十一知識者始從覺城東娑門羅林大塔廟處文殊一會終至于迦毘羅城釋迦女名曰瞿幾有四十一善知識故成三十一人也會縁入實相十位者從初摩耶夫人迄至竟徳生童子有徳童女在十一知識是云十位問何故云位十位云人十一人乎答懷生童子有徳童女合而云十位也問後三分各有一位者何答攝徳成因相有一位者彌勒智識也智照無二相有一位者文殊智識也顯因廣大相有一位者普賢知識也問約位有五十四位據人有五十五人者何云過一百一十城不如一念頂見普賢菩薩乎答云是綱目與廣疏意異綱目心者五十五人分主伴所以成一百一十城云云廣疏心五十五人分自分勝進分所以成一百一十城云云問寄位修行相有四十一位者云十信十住十行十迴行十地時從此外更亦無菩薩行位後十三位地前地上位中攝何位乎答是十三位十地中第十地後立不攝地前地上位也問覺城東者何位答發心已上位云覺城東謂自此位而始覺無漏解起始故云覺城也東者開明初也譬如日自東出創無漏智從是位起始所以云覺城東也問何故發心住以上位名自位究竟處乎答由三義故一者依三乘教出繋業三界得出世益故二者三乘益既究竟故三者住大乘自位究竟不退故也問且何故由三乘教出繋三界得出世益名自位究竟處乎答佛於一佛乘分別説三者導界内機拔彼三途苦令得出世益也故三乘教引界内機令得出世益爲究竟一乘教引界外機令得佛果益爲究竟也經文云是諸子等若心決定具足三明及六神通有得縁覺不退菩薩云云又云與諸菩薩聲聞衆乘此寶車直至道場云云不退菩薩者發心住以上菩薩也乘此寶車者乘一乘種智車到道場所得佛果也問以何知發心住以上位出繋三界得出世益云事答十住品云滅除諸煩惱永盡無有餘云云又云第四生貴眞佛子捨離生死出三界云云又攝論云十解以上得出世淨心云云又云十解以上位不墮二乘地云云問此等文意何答滅除諸煩惱永無有餘者發心住已上位而伏盡忍現行得出世益也第四生貴眞佛子捨離生死出三界者十住中第四生貴住此位出繋業三界得出世益也十解已上得出世淨心者十住異名也此位而起始覺無漏解得出世淨心故不墮二乘地言也問何故住大乘自位究竟不退云自位究竟處乎答不退者究竟異名菩薩發心住以上得心不退故云自位究竟處所以花嚴經云心不退文十地論釋曰自住處畢竟智云云畢竟者究竟義也問自住處畢竟智文心何答大乘法菩薩住處菩薩住大乘法心不退轉故云自住處畢竟智問約究竟有有學究竟無學究竟今此自究竟處者何究竟乎答有學究竟也諸地滿心云有學究竟如來地云無學究竟也諸地滿心猶有所可習學故云有學究竟如來地無是故云無學究竟也問以何得知乎答攝論云究竟道有二種一有學究竟二無學究竟諸地乃至如來地皆有此究竟義故云云地地皆臨次第乃至如來地有此究竟義也問發心住以上位得出世益故不隨二乘地者何舍利弗等聲聞人從第六住退大乘行益終教已上心是權現退而非實行退也起信論云如修多羅中説有退墮非其實退懈怠者令勇猛其心故云云又章文云本業經説十住第六心有退者起信論中釋彼經文爲示現退初學菩薩未入正位爲慢緩人策勵其心故云云問云舍利弗淨自天子法財王子等聲聞人退大乘行優婆塞或經修六十劫退云云本業經修八萬劫退云云二經何不同答對法抄云若説純劫六十劫若説雜劫八萬等云云所以不相違意若純修十住行退者修六十劫也若過去修加十信等行者修八萬劫退云也或修十住行或修十信等行以雜修逕八萬等劫數修八萬劫退云也非約次第記修位云云問於二乘何位云自位究竟處乎答預流果以上云自位究竟處此位斷三界分別煩惱得二乘出世益故初果以上位云自位究竟處問約聲聞立四向四果預流已上云究竟處可然於獨覺何答云此有二説一總含故預流果以上云究竟處一約獨覺立一向一果謂預流向與阿羅漢果也故以向隨果於二乘預流果以上云自究竟處也問於菩薩方便位中發心住已上位自位究竟處云約二乘亦可方便位中忍位以上位云自位究竟處何不爾答若以義者互爾義可有今約二乘初果入見道時起生空無漏智斷三界分別煩惱得二乘出世益故也故云初果已上也於菩薩發心住已上位起始覺無漏智得大乘出世益故此位云自位究竟處所以不可例故不云初地已上也此位而二乘教益已究竟故住二乘自位不隨凡夫地故云自位究竟也問小乘大乘見道同異何名同心別也小乘見道如常云云大乘見道者有眞見道相見道正體智斷惑證眞如云眞見道出正體智觀入後得智觀法先正體智經云相見道於此亦有三心相見道十六心相見道三心相見者一内遣有情假縁智二内遣諸法假縁智三内遣一切有情諸法假縁智也十六心相見道者亦有能取所取十六心上下八諦十六心也苦法智忍苦法智等云上下八諦十六心也唯識論云法眞見無間解脱見分觀諦云云能取所取十六心者論云法眞見道無間解脱見自證分差別建立云云具如唯識論并疏説問爲如何云法正體智乎答法者放學義也意學我正體智叶眞如是云放學之義也約眞見道亦有立一心眞見道師立三心眞見道師即立一心眞道爲正義也所以唯識論云雖多刹那事方究竟而事等故總説一心云云問宗意定性二乘無性有情皆成佛者何華嚴經性起品云大藥王樹不生二處謂地獄深坑水輪際也答大藥王樹不生二處者約現在位云事也後必遂生意地獄深坑水輪際間大藥王樹不生二處云也後必遂生者地獄深坑水輪際非凝然常住物有爲無常而不定物非地獄深坑水輪際之後必終生所經文云而不捨生性云云明知後必生芽云事問此喩也約法何答大藥王樹者本覺佛性也地獄深坑者定性二乘入無餘涅槃水輪喩無性有情斷善根位問喩意何答阿耨達池南雪山頂有大藥王樹無處而不生而不生地獄深火坑水輪寒底如是如來本覺佛性亦爾遍一切有情皆生芽而定性二乘入無餘逕八萬劫間無性有情未轉捨謗大乘因住斷善根位間其時如來本佛性不生芽云云地獄深坑水輪際有爲無常而不定壞劫時教壞成劫時成平地大藥王樹必遂生芽佛性亦爾也定性二乘人依本覺内薫力所催佛菩薩外縁從無餘出發大乘心乃至成佛又無性闡提轉捨謗大乘因發善心時如來本覺佛性無不生芽所以經次文云不捨生性云云由此義故定性二乘無性有情一切皆成佛云事道理顯然也華嚴經三十六云復次佛子譬如雪山頂有藥王樹名非從根生非從根生彼藥王樹從六百八十萬由旬下極金剛地水輪際生乃至佛子此藥王樹一切諸處皆生長唯除二處所謂地獄深坑及水輪中不得生長而大藥王樹亦不捨生性如來智慧大藥王樹亦復如是從一切如來種性中生乃至唯除二處不得生長所謂聲聞縁覺涅槃地獄深坑及諸犯或邪見貪著非法器等而如來樹非不生長其餘一切應受化者皆生長等云疏十六云第七藥王樹生長喩喩佛種性深廣智乃至此中二乘涅槃合地獄坑以大燒灰斷故犯或等合水輪處有四過失一犯或約不懺悔者二邪見約爲斷善之因三貪著據不可轉改四非器就無出世道器或此亦是過結上三若直看此文似初定性二乘後約無性凡夫故二處不可生也若據後文合不捨生性則知非畢竟無以此二位約現在説若約當來皆出新生也等云云問宗意而立四車若立三車乎答立四車問其四車何答臨門三車加露地大白牛車云四車問立三車既足何故答爲顯權與實別事立四車也臨門三車云權露地大白牛車云實也臨門三車同羊鹿未得故權大白牛車三乘人同到門外倶故云實問四車義證文如何答經第一卷云如來但以一佛乘故爲衆生説法無有餘乘若二若三云云又云十方世界中尚無二乘何況有三云云又云諸佛以方便力於一佛乘分別説三云云又云十方佛土中唯有一乘法無二亦無三除佛方便説云云又云我有方便力開示三乘法一切諸世尊皆説一乘道云云第二卷云如彼長者初以三車誘引諸子然後但與大車如來亦復如是初説三乘引導衆生然後但以大乘而度脱之云云又云當知諸佛方便力於一佛乘分別説三云云又云如此種種羊車鹿車牛車今在門外乃至爾時長者各賜諸子等一大車云云又云是時諸子各乘大車得未曾有非本所望云云又云時諸子等各白父言父先所許玩好之具羊車鹿車牛車願時賜與云云又合喩文云如彼諸子爲求羊車鹿車牛車出火宅云云如彼長者見諸子等安穩得出火宅等以大車而賜諸子云云依此等文立四車也問露地大白牛車者喩約法何物乎答喩同教別教一乘也問何一車喩二種乘乎答名二義意一故無妨問二義一意何答法花經隱重重無盡義以一相一味義對三乘機説唯一無二其三乘人不信重重無盡義故更不説也華嚴經隱一相一味義對普賢等大機説三種世間圓滿一大法身理其普賢等機一相一味義從先悟故更不説也然法花一乘華嚴一乘不過從唯一無二之一因一果道理所以云名二心一也問天台所立四車與今宗所立四車同異何答異也今宗依四義立四車天台但以一義立四車所以別四義者一前三後一義前一後三義三三一同時義四三一無礙義由此四義故立四車也天台唯依前三後一義立四車不由後三義也問四義意何答疏第一有四門一本末差別門二依本起末門三攝末歸本門四本末無礙門由本末差別門立三一同時四車由依本歸末門立前一後之四車依攝末歸本門立前三後一四車依本末無礙門立三一無礙四車若有衆生小乘根性決定者見從初成道終至涅槃但説小乘法不説餘法若有衆生三乘根性決定者見從佛初成道至終於涅槃但説三乘法不説餘法若有衆生此世於一乘法根成熟者見從佛初成道至竟於涅槃唯説一乘法不説餘法所以由本末差別門時始終一類無前後故立三一同時四車譬如日初出時光照大山次照中山次照小山後照大地佛初成道先爲普賢等大機説華嚴經次爲辟支佛中機説中乘次爲聲聞小機説小乘教次爲世間機説人天樂法所以由依本起末門立前一後三四車也佛初成道先説般若深密三乘教導三乘然後説法花一乘而度脱之所以依攝末歸本門立前三後一四車也文殊般若經云三乘即一乘一乘即三乘云云所以依本末無礙門立三一無礙四車也此四義中天台所立四車是攝末歸本門義所以彼所立四車未盡究竟理今宗所立四車該四義故攝理盡所以不同天台所立四車也問爾此四義相配分相門該攝門何答初三義分相門後一義該攝門也問法花一乘與華嚴一乘爲同異乎答有同在異問意何答以法花一乘説同教別教華嚴一乘説同教別教同也以華嚴一乘多説別教義法花一乘多分説同教義異也法花經七寶大車其數無量等云文是説別教義會昔三因三果令入平等大會一乘是説同教義也華嚴經説帝網重重無盡法門文是説別教義舍利弗文殊邊迴心悟十大法門等是説同教義也問且就十方佛土中唯有一乘法無二亦無三云文云無二所遮何物云無三所復遮何物乎答無二者遮二乘無三者遮菩薩乘所以疏云今釋有二位一約事破二乘實滅二於教會大乘權教云云文心者無二者破二乘涅槃無實滅無三者遮無大乘權言也法花一乘心而説定性二乘人自無餘出成佛教故破二乘涅槃無實滅也遮深密等權教大乘説定性二乘人從無餘出不成佛教亦無所以疏云深破二乘即是破三乘云云法花論云唯佛如來得大菩提究竟滿足一切智慧名大涅槃非諸聲聞辟支佛等有涅槃法唯一佛乘故云問爾此文者何遮二乘何遮菩薩乘乎答非聲聞辟支佛者遮二乘文也等者等菩薩乘所以云無三者無菩薩乘云事也問於一佛乘分別説三者一斗米三分與三人時離此三外別無斗米如此於一佛乘分別爲三乘人三時離三乘外無別一乘法何云三乘外別立一乘有四乘四車答於一乘無盡教義少分分別爲三乘説三一乘無盡教義當不失所以三外別立一乘云四乘四車故章云三乘即一雖具存壞竟必有盡一乘即三雖具隱顯終恒無盡云云問一斗米分三時離此三外無一斗米於一佛乘分別爲三乘説三一乘體當不失者法與喩不相似何者一斗米分三時無一斗體故何智度論引一斗米喩雖一乘三乘乎答云此先徳有二傳一云一斗米分三時一斗在三中分三不失一斗體所以法與喩甚善相合也一云約喩有全喩分喩所以必不取全分相似取少分相似譬如佛御齒喩蒜取其色白而不取臭如此一斗米分三取與三人當爲喩不取分三無一斗體當也故涅槃經云凡所引喩不必盡取或取少分或取多分或全取故云云問約機顯理差別門意何答爲劣機顯淺理爲勝機顯深理由此顯理差別明一乘三乘異三乘機云劣機爲是顯淺理一乘機云勝機爲是顯深理淺理者三乘教也但説一相一寂等法主伴不具足所以云淺理一乘教顯三種世間圓滿十身無盡一大法身理所以云深理故章云此明一乘法門主伴具足故云無盡佛法不同三乘一相一寂等法也云云一相一寂等法者法花經第三云如來知是一相一味之法所謂解脱相滅相究竟涅槃常寂滅相終歸於空云云文意一相者同一無相一味者同一解脱味解脱相離相滅相者皆此空異名同以人法二空爲彼體故云終空於空是云一相一寂等法所以不同三乘一相一寂等法也問以何知一相者同一無相云事答大般若經三百八十三云通達一切有爲無爲皆同一相所謂無相云云問依何證約機顯理差別答十地品云若有衆生下劣其心厭沒者示以聲聞道令出於衆苦復有衆生諸根少明利樂於因縁法爲説辟支佛道若人根明利有大慈悲心饒益諸衆生爲説菩薩道若有無上心決定樂大事爲示於十佛身説無盡佛法云云以是文證也既文云爲説菩薩道不云無盡佛法所以爲三乘劣機唯顯一相一寂等淺理亦既云説無盡佛法不云爲説菩薩道所以爲一乘勝機顯重重無盡深理云也問此文證爲三乘菩薩顯淺理爲一乘顯深理也何故具説聲聞縁覺等三乘答章云此地中作大法師明説法儀軌是故開示一乘三乘文之差別云云問此章文意何答此地者十地中第九善慧地也意菩薩第九地爲説法師流四辯七辯以一音説法一語言中演説無邊契經海三乘人聞是各別得解所以今此具説三乘故云明説法儀軌開示三乘差別問何以知菩薩一語中演説無邊契經海云事答華嚴經云如來於一語言中演説無邊契經海云云又維摩經云佛以一音演説法衆生隨類各得解或有恐怖或歡喜或生厭離或斷疑云云凡夫恐怖二乘厭離地前菩薩斷疑准知佛菩薩亦分然云事地上菩薩歡喜了問約教事深細明一乘者何答三乘教漸深漸細相似一乘所以三乘即名一乘言也問何其三乘教漸深漸細相似一乘答三乘教中説靈山穢土即淨土同一乘教中説花藏世界即娑婆穢土亦三乘教中説龍女往南方無垢世界一刹那頃成佛轉法輪同一乘教中説初發心時便成正覺等復三乘教中説須彌攝芥子中大海水入一毛端同一乘教中於一塵中含十方等説也問何三乘教説靈山穢土即名淨土答法花經曰常在靈鷲山云云意娑婆穢土唯在化身釋迦非在自受用身也而自受用身佛言我常在靈鷲山明知靈山穢土即名淨土云事問以何知爾乎答經下文云衆生見劫盡大火所燒時我此土安隱云云若化身所居土者劫盡之時滅壞而既我此土安穩云云明知是自受用身佛云事自受用身者即是報身如來也問約八義意趣明一乘者其八義者何答爲引攝一類二爲任治諸餘三法等故四無我等故五解脱等故六性不同故七得二意樂故八化者由此八義意趣總三乘名一乘言也問爲引攝一類等十義因攝論出爾勘彼論正文説十義無説八義爾物何云違論文約八義意趣明一乘答二意樂合爲一者第十究竟故約八義意趣云明一乘也二意趣體同故合爲一也亦云第十究竟一乘顯了一乘也法無我等一乘密意一乘合擧密意一乘限除顯了一乘所以云八義意趣也問何故初九一乘名密意一乘後第十一乘名顯了一乘答初九一乘對不定種姓人可成佛密意存三説一所以云密意一乘後第十一乘對三乘五性人就佛性平等皆成佛道理顯了説一切皆成佛所以云顯了一乘也問約十義方便明一乘者何答一對三寶分別二對四諦分別三對二諦分別四對有過無過分別五對人及智分別六對解了法分別七對三乘小乘分別八對大乘中乘小乘分別九對世間出世間出出世間分別十對譬喩分別也且對三寶分別者佛寶名一乘法寶僧寶名三乘言也佛法同無盡所以名一乘法寶僧寶即不定所以云三乘也佛寶同別教一乘故云同無盡法寶望佛寶劣由僧寶勝僧寶望僧寶劣由餘勝所以云不定也對四諦者滅諦名一乘餘三諦名三乘云也滅諦同無盡所以名一乘餘三諦即不定所以云三乘也對二諦者第一義諦名一乘世俗諦名三乘也第一義諦同無盡所以名一乘世俗諦即不定所以名三乘也對有過無過者有過者有恐怖無過者無恐怖即有恐怖名三乘無恐怖名一乘也有恐怖不定故名三乘無恐怖同無盡故名一乘也謂有恐怖者未斷盡煩惱人無恐怖者煩惱已斷盡人也問對人及智者於人及智各有三種若有人成就甚深法智若有人成就隨順法智及有人於甚深法讓非是我所知法唯佛菩薩所知約此三種智成就初甚深智人名一乘成就後二智人名三乘云也成就初甚深智人同無盡所以名一乘成就隨順法智人及讓於甚深法非此我所知法但佛菩薩所知人不定所以名三乘成就甚深法智者初地以上位無漏智成就隨順法智人者三賢位有漏智第三智十信位智也對解了法者無分別現量證眞如名一乘隨文取義名三乘言也無分別現量證眞如同無盡所以名一乘隨文取義即不定所以名三乘也對一乘三乘小乘分別者同教一乘名同無盡故三乘小乘名三乘即不定故對大乘中乘小乘分別者大乘名一乘同無盡故中乘小乘名三乘不定故對世間出世間出出世間者出出世間名一乘同無盡故世間出世間名三乘不定故地前位名世間從初地至于出七地名出世間八地以上出出世間也出世説出世故出出世云云對譬喩分別者勇猛懃爲作難爲事之人王解髻中珠歟名一乘同無盡故有人至親友家醉酒而臥親友内衣裏繋無價寶珠等云設言窮子與寶藏等云名三乘即不定故無盡不定義准初方便可知之問爾此十義方便由何經論説答初五義由勝鬘經説第六義由楞伽經説第七義由梁攝論説後三義由法花經説問何故三乘中説一乘名答引攝三乘人入一乘時爲令易信解三乘中説一乘名也問文云依上諸義則三乘等並名一乘者心何答由上法相交參等七義總三乘名一乘云事結文也問文云明三乘亦有三種者何答一者一乘三乘小乘名三乘二者大乘中乘小乘名三乘也第三段闕文章文不述問且一乘三乘小乘名三乘者上既云一小乘三乘合爲二乘何今開一乘三乘小乘爲三答章曰此爲顯法本末故云云問此意何答一乘爲本三乘爲末亦三乘爲本愚法小乘爲末爲顯此法本末開立三乘也問依何法開愚法小乘答文云上開一乘下開愚法故有三也云云文意三乘量中上開一乘下開愚法小乘所以立三乘云也問何時開何時合答上一乘合三乘愚法合迴心立二乘今此三乘中開出一乘迴心中開出愚法立三所以五教引經文云愚法二乘並在所引諸子中云云故知三乘外別有小乘又曰三車引諸子云云故知小乘外別有三乘或云三人倶出至露地已更別授大白牛車云云故知三乘外別有一乘云云問何以知愚法二乘在所引諸子中云事答文曰以彼愚法約大乘終教以去並不名究竟出三界故云云意愚法小乘望終教以去宗意不名究竟出三界故猶在宅内既在宅内所以迴心共教大乘由其共教大乘更出宅故愚法二乘在所引諸子中也問何故愚法小乘不名究竟出三界答文曰以人執煩惱未拔故但能攝伏而已云云意愚法二乘望迴心二乘約煩惱障斷九十八使未斷百二十八使且斷六識相應煩惱未斷七識相應煩惱復伏現行未斷種子但能攝伏事故是等煩惱未斷盡故不名究竟出三界迴心二乘是等煩惱永斷盡故究竟出三界問爾其九十八種百二十八使者何答具如斷障義所可知也問爾其六識相應煩惱七識相應煩惱者如何云爾答隨順前六識起煩惱名六識相應前六識及第七末那相應起煩惱云七識相應煩惱四阿含經中説六識未説第七第八二識説九十八使未説百二十八使所以云愚法二乘但斷六識相應煩惱未斷七識相應煩惱等凡云八識相應煩惱貪嗔癡三五識相應起第六識強分別識故具起十煩惱第七識但起四我癡我見我慢我愛第八識無記故不起煩惱具如五教下卷斷惑章問何以知愚法二乘不名究竟出三界云事答五教引稱問經論云一切聲聞辟支佛人不能如實修四無量不能究竟斷諸煩惱但能攝伏一切煩惱故云云又法花經曰汝等所得非眞滅度云云復云若不信此法實得阿羅漢無有是處云云或大品經云欲得阿羅漢等果者當學般若波羅蜜云云以是等文知愚法二乘不名究竟出三界云事問何以此等文可知愚法二乘不名究竟出三界云事答一切聲聞辟支佛人不能如實修四無量等者謂一切聲聞辟支佛者愚法二乘四無量者自利利他行意迴心二乘所證四無量實愚法二乘所證四無量假也又汝等所得非眞滅度者謂汝等愚法二乘意愚法二乘彼教中所説伏煩惱障現行未説彼教中煩惱障種子不斷所以彼所證得涅槃非實涅槃也又若不信此法得阿羅漢果無有是處者迴心二乘信受大乘法故易信一乘法所以得阿羅漢果愚法二乘未信受大乘法故難信一乘法所以不能得實阿羅漢果若不信此法花一乘得實阿羅漢果者無有是處言也又當學般若波羅蜜者謂般若波羅蜜者大乘也意依共教大乘中説迴心二乘教修行得實阿羅漢果修行愚法二乘教非得實阿羅漢果所以依共教大乘中説迴心二乘教修行彼可得實阿羅漢果言也故以此文知愚法二乘不名究竟出三界云事所以五教總釋上所引經論文言是故當知羅漢實義在大乘中云云問阿羅漢以實義云時在大乘中意阿答由大乘教得實阿羅漢果非依愚法二乘四阿含教得實阿羅漢果也四阿含説阿羅漢等果假阿羅漢果非實言也問以經中愚法二乘並在所引諸子中指何經答指上所引彌勒所問經法花經大品經問爾其經中無説愚法二乘並在所引諸子中何五教師引愚法二乘並在所引諸子中答是五教師得意引也非經正文正文如上所引問何故但不言愚法二乘在三界内云在所引諸子中答共教大乘教中説迴心二乘教引愚法二乘合出三界故其共教大乘教云能引愚法二乘其教所引可出宅故云在所引諸子中也意共教大乘教名能引愚法二乘名所引言也問深密等經瑜伽等論説第七識與四煩惱相應第八識中持煩惱種子是等煩惱斷盡及得阿羅漢果所以可云愚法二乘約大乘始教以去不名究竟出三界何今云超始教約終教以去不名究竟出三界答今此總深密經瑜伽等論名終教者始教非言終教以去所以不相違問若爾何疏判般若深密等經説定性無性不成佛故攝始教法花涅槃等經説定性無性成佛故攝終教答判始終二教五教與疏意別問何異答五教依空不空門判始終二教疏由成佛門判始終二教今由空不空門總深密等經瑜伽等論攝終教所以不相違五教意深密經説三性眞如不空道理故攝終教般若經説諸法皆空道理故攝始教言也疏意般若經説定性無性皆成佛故攝終教深密經説空性無性不成佛故攝始教言也問阿羅漢以實義時在大乘中者聲聞等三藏唯具大乘中不具小乘中耶答小乘中不具所以普超三昧經云唯大乘中得有三謂聲聞藏縁覺藏菩薩藏餘二乘中則無此也云云問三藏三地三乘同歟若異答名別體同攝藏聲聞縁覺菩薩教理行果故名三藏生生任持三乘出世果爲所依故以依義名三地有運載義故名三乘所以異體是即同問唯大乘中具三藏小乘中不具者何云疏約三乘有三種一始別終同三乘謂如小乘中説又何同教門下文云小乘中亦有三聲聞法縁覺法及佛法乎答始別同三乘以義分三乘小乘中有三種三乘開合云三乘今此別別開三乘於大小乘中論具不具所以不可爲例具准上可知之問文云入大乘論亦同此説者心何答結普超三昧經文與入大乘論同云事也問法花經臨門三車者喩約法何答喩大乘中三藏即共教大乘謂大乘中三藏者聲聞藏縁覺藏菩薩藏若約喩羊鹿牛車即如次配普超三昧經中若指教般若深密等經問臨門三車喩大乘中三乘不喩愚法二乘答爾不喩答章曰門外三車不過愚法法花非小乘故云云意法花經既是大乘何以大乘教中説臨門三車可喩愚法小乘云也問愚法二乘所修斷惑證理行與不愚法二乘所修行斷惑理證行有何異愚法二乘教不喩臨門三車答云是大乘論與小乘論有多不同問其不同何答小乘教中説斷九十八使大乘教中説斷百二十八使又小乘教中説伏煩惱障礙不説斷種子大乘教中説斷煩惱障種子得者現行耳又小乘教中不説分斷所知障大乘教中説分斷所知障又小乘教中不説有頓出離人大乘教中説大頓出離人或小乘中不説十煩惱倶迷四諦理大乘中説十煩惱共惑四諦理由是等不同愚法二乘斷惑證理行不愚法二乘斷惑證理行別云所以愚法二乘教不喩臨門三車故章云瑜伽聲聞決擇及雜集等論辨聲聞等教行位果及斷惑分齊與婆娑倶舍等不同者是事也云云問此文意何答聲聞決擇者瑜伽中説聲聞分決擇分雜集論對法論此等大乘論中説斷惑證理婆娑倶舍等小乘論中説斷惑證理不同云也問文是故當知一乘三乘小乘分齊別者何答不共般若名一乘共教般若名三乘不共般若者不思議經即花嚴經也般若者諸大乘經通名也説皆智慧事故三乘人倶不被教故云不共也説重重無盡義故非二乘所知所以名不思議經智度論云不思議經者即指花嚴是所以知云爾又智度論云共者摩訶衍經及餘方等經云云此文意摩訶衍者漢云大乘方等者是大乘經異名即般若深密等經三乘人共所被教故云共教説三乘人智慧事故名般若問花嚴三乘人倶不被故名不共者阿含等經亦一乘不共故名不共乎答爾無妨所以章云四阿含經亦名不共以唯説愚法二乘教故云云問於大乘有共小乘大乘不共小乘大乘又約小乘有共大乘小乘不共大乘小乘乎答爾有也不共小乘大乘者三外別教一乘共小乘大乘者三乘中共教大乘也共大乘小乘者迴心二乘不共大乘小乘者愚法二乘也問分一乘三乘小乘章師得心分歟若有所依論文乎答梁攝論云善成立有三種一小乘二三乘三一乘第三一乘最居上故名善成立云云問第三一乘最居上故名善成立者又可列一乘三乘小乘何列小乘三乘一乘亦何五教列一乘三乘小乘答分一乘三乘小乘疏有二門一依本起末門二攝末歸本門五教由依本起末門列一乘三乘疏由攝末歸本門列小乘三乘一乘也或列教有從深列淺次第自淺列深次第五教自深列淺攝論從淺列深所以不相違也問慈恩等師難五教師云説大品等經時有三乘人聞説諸法皆空道理如來一音聲聞人悟四諦因果道理得聲聞果縁覺人悟十二縁起因果道理得縁覺果菩薩解三性三無性唯識六度等因果道理得無上菩提果所以三乘人如來一音別解各得自果故有三乘云也而何五教師如大品等經共集三乘衆通説三乘法具獲三乘益故云般若深密等經判三乘教難何答乎答五教師返難云説大品等經時一音異解得小果故有三乘者説花嚴時何不異解得小果乎又説増一等時何不異解得大果乎云云問此難意何答難意若説大品等時三乘人如來一音異解得三乘因果故有三乘者説花嚴時一音異解有得二乘果人故可有三乘亦説阿含等經時一音異解有得大乘果人故有三乘爾物何説花嚴經時唯有得一乘果人無得二乘果人復何説四阿含經時但有得小乘果人無得大乘果人所以汝所難都不應道理爾不可難言也答就五教師御意者可云説花嚴經時大乘人得大乘果説阿含經時小乘人得小乘果説大品等經時三乘人具各得三乘自果言也問文是故當知三宗各別理疑也者此文心何答一乘三乘小乘別事決定一乘三乘小乘若同歟若異歟不可更疑云也問若爾維摩經云佛以一音演説法衆生隨類各得解等以是文見有三乘人一音異解各得三乘出世果理答彼説維摩經對三乘機欲令悟三乘人故三乘別悟説花嚴等一乘教阿含等小乘教時非一音異解所以不相違問章云大乘中乘小乘爲三乘者何答云此有三義一者三外一乘三中大乘合爲大乘愚法縁覺迴心縁覺合爲中乘愚法聲聞迴心合爲小乘所以五教云融一乘同大乘合愚法同小乘故唯三也云云二者上除一乘下除愚法小乘三乘中三中大乘即名大乘迴心縁覺名中乘迴心聲聞名小乘所以章云大乘中自有三乘云云三者除一乘三乘愚法小乘中佛法名大乘縁覺名中乘聲聞名小乘所以章云小乘中有三如小論中有聲聞法縁覺法及佛法此中佛法但慈悲愛行等異於二乘故云云問小乘中無修大乘行得大乘果爾何云小乘中有佛法答雖無小乘中修大乘行得大乘果人四諦因果道理之上麁修慈悲愛行等行亦三無數劫外別百劫修相好業成應果何所以彼小乘教中所名號今出同教種處假名大乘中乘小乘所以云小乘中有佛法問小論者何等論答謂小論者婆娑倶舍等論慈悲愛行等行者小乘中有相似菩薩修大慈大悲行云也問爾小乘人三身中何身名自果佛身答彼小乘人修小乘教中説慈悲愛行等行菩提樹下而成丈六釋迦是則自果佛身執從此外更亦無佛身所以云小乘中有佛法也問上明三乘有三種云釋第一第二段了第三段章文釋不述者何云事答是云有先徳二傳也有人云寫章人寫漏所云第三段闕也有人云第三段釋者非何者釋第二段之中第三段有二釋一近則第二段中第三段二遠即初明三乘有三種云中第三段也謂第二段中第三段者云小乘中亦有三如小乘中説是所以云第二段闕者非也問四明四乘有三種者何答一者三外一乘三中大乘愚法迴心縁覺并聲聞云四乘所以章云開一異三合二聲聞故云云問若爾何云合二聲聞故不云合二縁覺故答擧聲聞影略縁覺准可知所以更不説二者一乘三乘小乘人天之四乘問其三乘等者何答三中大乘迴心二乘云三乘爲提謂等五百商人説三歸五戒教云人天等所以章云此總開也云云意上説出世間不説世間今此世間出世間出出世間總開言也謂人者人三洲不入北洲天者欲界六天色界十八天不入無色界三者三乘與人天云四乘謂三乘者一乘與大乘合爲一愚法迴心縁覺爲一愚法迴心聲聞爲一菩薩乘獨覺乘聲聞而云三乘所以章云准上可知之五明同教五乘亦有三種一者一乘三乘小乘云五乘謂三乘者三中大乘迴心縁覺迴心聲聞云三乘二者三乘與人天云五乘謂三乘者三外一乘三中大乘合爲一迴心二乘爲一愚法二乘爲一云三乘三者佛乘與二乘天及梵云五乘謂佛乘者一乘合佛乘愚法二乘迴心二乘唯除人故先耳六者同教無量乘者一切法門也此非五教師私意有所依文也所以花嚴經入法界品云於一世界中聞説一乘音或二三四五乃至無量乘云云約同教有三義一三乘同一乘故名同教二一乘同三乘故名同教三三乘人共所被教故名同教初二以相似義名同教後一以共義名同教云上諸同教義不過此三義問此三義意何答三乘同一乘故名同教者三乘同教若指教梵網經等一乘法説交三乘法故以相似義名同教一乘同三乘故名同教者一乘同教也若指教花嚴經三乘法説交一乘法故以相似義名同教三乘人共所被教故名同教者三乘人同聞深密經各得出世益故深密經名三乘同教也三乘人共聞説法花經悟唯一無二道理同得一乘果故法花經名一乘同教也具如上云云問融本末門意何答本者一乘末者三乘云是一乘三乘有二門一泯權歸實門二攬實成權門依此二門顯一乘三乘體無二融本末門意問一乘三乘權實既別何云體無二答泯權歸實門心乍有三乘體即一乘言也攬實成權門心乍在一乘體即三乘言也所以章云體無二同一法界也意一乘法三乘法皆同以一法界眞如理爲體所以乍在三乘體即一乘乍在一乘體即三乘言也問一乘三乘同以一法界眞如理爲體者何云三乘權一乘實立四乘答章云義門別故權實恒殊理遍通故全體無二云云意以一乘法三乘法同以一法界眞如理爲體義平等一味而體無二以於一佛乘分別爲三乘人説三乘義一乘三乘差別而非無權實所以云三乘外別有一乘立四乘言也故章云即不壞權而即泯故三乘即一而不礙三即不異實而即權故一乘即三乘而不礙一云云問一乘即三乘三乘即一乘云時一乘與三乘如牛角常雙可有爾物何云捨三乘權迴入一乘實答章云三乘即一雖具存壞竟必有盡一乘即三雖具隱顯終恒無盡云云文意者三乘人迴入一乘成佛時三乘一乘因故無三乘法所以云三乘竟有盡迴入三乘無爲三乘果道理所以云一乘終無盡故章云權起必一向頼於實是故攬實實不失實顯未必一向頼於權故泯權權不立云云問若爾可云一乘即三乘耳何云三乘即一乘答三乘人迴入一乘時三乘法無其體而於一佛乘分別説三乘時一乘三乘相並存何不云三乘即一乘譬水隨風縁爲波風止時無波相而隨風縁水波並起何云水即波不云波即水如是三乘即一乘云事亦爾也問約一乘三乘四句分別何答或唯一乘而非三乘對普賢等大機説一乘法故即別教一乘或唯三乘而非一乘對三乘機説三乘教故即共教大乘或一乘亦三乘倶有初説三乘後説一乘故即同教一乘或非一乘三乘望上果海時言亡慮絶故不可分別一乘三乘所以章云此四義中隨於一門皆收法體云云意四句互相攝云也問一乘法攝三乘法云事可然何云三乘法攝一乘法答三乘法中自一乘法從本有而彼三乘人不知三乘法中有一乘法法體自相融何句一法而有釋所以云三乘法攝一乘法故章云如三乘等教以不知一故云云問約水與波四句分別方何答或水而非波故或波而非水以水攝波故或水波並現故或非水非波互奪不同故問互奪不同故云意何答但云水時無波相唯云波時無水體所以互奪不同也問文云餘釋乘名體等並如別處説者此文意何答上別教門以十差別門釋一乘與三乘別今此同教門説一乘二乘三乘雖明一乘同教三乘同教未釋乘名體釋乘名體等具如起信論疏并廣疏中釋云也起信論疏云大者當體爲名包含爲義就喩爲名運載爲功用體合擧故名大乘等也云云文意者大者眞如三大即體大相大用大此三大廣大甚深包攝世間出世間善因果故包含爲義譬如世間車能乘所乘乘所至處具此三爲運載眞如三大亦爾能乘所乘乘所至處三具處運載所以名大乘也問何云能乘所乘乘所至處答約本覺佛性有三位即一自性住佛姓二引出佛性三至得果佛性即配能乘所乘乘所至處問何云自性住佛性等答本覺智名自性住佛性即從無始在有情身中眞如理始覺智名引出佛性即依本覺智所修顯始覺無漏智佛果位云至得佛性問約始覺智有幾種答有三種即一相似覺三賢位起始覺智也二隨分覺自初地至于第十地起始覺智也三究竟覺佛果位起始覺智也即初二引出佛性後一至得果佛性也問何以知自性住佛性名所乘云事答起信論云一切諸佛本所乘故一切菩薩皆乘此法到如來地故以謂一切諸佛本所乘故皆乘此法者自性住佛性一切菩薩者引出佛性到如來地故者至得果佛性也問大乘者爾也一乘者何乎答一乘者漢語梵云翳迦衍乘體無二故名一乘也問本覺智名佛果若始覺知名佛果答起信論疏云以始覺者即同本覺云云意依本覺有始覺依不覺有始覺本覺成不覺不覺成始覺始覺同本覺同本覺故無不覺無不覺故無始覺無始覺故無本覺無本覺故平等平等而言亡慮絶此故佛果圓融肅焉而無住處言也不覺者無明也具如起信論疏問宗調度章疏中一乘名義如何釋乎答指事中引元曉師釋云所乘法略有四種一謂一乘理一乘教一乘因一乘果如是四法更互相應倶運一人令到薩般若故此四法名一乘譬如四馬更相應倶作一運故説四馬名一乘云云問瑜伽論所論説四車與五教所説四車若同異歟反問先瑜伽四車者何反答鹿牛馬象是彼瑜伽論所説四車也答指事云所喩雖異義意無別故取爲證云云問所喩別者意何答指事引瑜伽第四十六云作四車喩大乘中地前地上位所見別開云四車者一鹿喩聲聞最劣故與此不同此中取居山故獨覺喩二牛喩獨覺勝聲聞故三馬喩地前所見菩薩勝上二故亦喩涅槃四象喩地上所見涅槃以最勝故云云問法相師對花嚴師立量云汝所執大白牛車應是權得乘之名故如羊鹿車立時差何過可遮答付相符過闕無同喩過所立不成過遮問爾其等過有方何答今敵論者宗一乘融攝三乘許權爾物今不置簡別言但立汝大白牛車云權有相符過又二乘融攝一乘許實爾物亦不安簡別立一同喩如羊鹿車有闕無同喩故不成所立所以有所立不成過問何故但不立大白牛車可權必加汝執言答大白牛車實云事但立敵論者宗不立立論者宗爾物不加汝執言唯立大白牛車應權有自所別不成過今遮此過而加汝執言也問何言自所別不成過答佛法對外人立量云我應無不可得故如龜毛等立時立者佛法不許我爾物有法擧我見立者自不成所別我所以有自所別不成過是即自所別不成過本作法如此立者宗不許大白牛車云實事爾物有法擧大白牛車見立者自不成所別大白牛車所以有自所別不成過問何云相符過答眼見色聲所聞青蓮花香立等是相符本作法如此敵者宗一乘融攝三乘大白牛車許權爾物云爾人立大白牛車權有相符之過也問何云無同喩過所立不成過答聲應常無質礙故如覺立是所立不成本作法問爾是有所立不成過方何答覺無質礙而無常物爾立聲應常如覺闕無同喩無同喩故不作所立常宗所以有所立不成過如是敵者宗三乘融攝三乘羊鹿二車許實爾立大白牛車應權如羊鹿車闕無同喩故不成所立應權云宗所以有所立不成過也問法相師亦立量云汝所執大白牛車除餘應是權得云乘名故除餘如羊鹿車立時有何過答有不定過問有方何答若如羊鹿車耶得乘名故大白牛車是權若許如三中牛車耶得乘名故大白牛車是實問何故唯不云如三中牛車耶大白牛車是實矣而必云許如三中牛車耶答立者宗許如三中牛車大白牛車是實云也問爾量此許簡別遮何過答遮違宗過問何遮答敵者宗不許三中牛車實爾物唯如三中牛車耶大白牛是實矣者有違宗咎今爲遮此過而安許簡別問本量云宗除餘云喩除餘言遮何咎答宗安除餘言遮相符過喩安除餘言遮所立不成過也問何以除餘簡別遮相符過所立不成過答敵者宗融攝三乘一乘許權爾不簡別立大白牛應權有相符過所以今除敵者融攝三乘許權大白牛車云大白牛車應權而云除餘應權故以除餘簡別簡相符又敵者宗融攝一乘三乘許實爾不簡別立如羊鹿車有闕無同喩所立不成過所以今除敵者融攝一乘許實羊鹿車云如羊鹿車而云除餘如羊鹿車故以除餘簡別所立不成問法相師亦立量云汝所報大白牛車是應非實兩極成車所不攝故如龜毛等是量付何過可遮答付不定過遮問不定過有方何答若如龜毛等耶兩倶極成車所不攝故我大白牛車非實矣若如色等耶兩倶極成車所不攝故我大白牛車是實矣問此不定有違宗咎所以不成咎反問先其有違宗過方何反答諸聖教中云色等諸法非有似有如幻假有説不説實有爾違聖教云如色等實矣有違教咎答聖教中説色等諸法如幻假有望眞如理性説事望遍計所執云時聖教中色等諸法皆實有説望是云如色等實所以猶有不定盡也問付第二比量三中牛車分異品見立者自分爾因明道理自不定於他比量不成過爾物云許如三中牛車得乘名故大白牛車是實付不定過所以不成過答其就疏意然耳今纂要意而自不定爲他比量成過所以纂要云就他破他於他及共自不定皆爲過云云問先何云自不定他不定共不定答以見立者自分異品法作不定云自不定以敵者他分異品法作不定云他不定以見立敵分異品法作不定云共不定也問法相師亦立量云汝執大白牛車是應權者隨一攝故如羊鹿二車立時付何過可遮答有相符過所立不成過問有方何答准前可知之相符過亦立已成過也問法相師亦立量云汝執第四車是應非實非兩倶極成車故如龜毛等立時付何過可遮答有不定過問有方何答爲如龜毛等非兩倶極成車故我第四車非實矣若如外宗神我自性非兩倶極成車故我第四車是實矣問有人能別中置簡別汝執第四車應非實車非兩倶極成車故如龜毛等立時猶有不定過耶答是猶有不定過問有方何答如龜毛等非兩倶極成車故我第四車非實矣若如許三中牛車非兩倶極成車故我第四車是實矣問若於此量分宗因喩方何答且就初重者大白牛車應權者宗得乘名故者因如羊鹿二車者喩也宗因喩亦名三支即宗支因支喩支也約宗在有法法所別能別前際後際約喩有同喩異喩也問何云有法法等答且就九句中第二句正因因物者聲是應無常所作性故同喩如瓶異喩如虚空立時聲者是有法亦名能別復名前際應無常者是法亦名能別復名後際也問爾此宗因喩有幾過答有宗九過因十四過喩十過同喩五異喩五總云三十三過也問此花嚴經深密經中三時妙智經中三時之中攝何時乎答此二經三時中不攝深密經三時阿含等經初時攝般若等經第二時攝深密等經第三攝是即戒賢論師所立三時教也法相師也妙智經三時者阿含等經攝初時深密等經攝第二時般若等經攝第三時是即智光論師所立三時教也三論師也妙智經在天竺未翻經也今花嚴師此三時外別立第四教攝法花涅槃花嚴勝鬘等一乘教也問今花嚴師所立四時教者何答深密經初時教妙智經初時教合云初時深密經第二時教云第二時教深密教第二時妙智經第二時合云第三時法法花涅槃般若花嚴等經云第四時也問般若經深密經第二時教也而何今宗意攝第四時教乎答深密經第二時教收地前菩薩施惠江邊説般若也不云六百卷般若及花嚴法花等般若也問施惠江邊般若與六百卷般若何有異乎答施惠江邊般若一向説諸法皆空道理不説唯一無二所以異也問何故般若經第四時教乎答定性二乘成佛説故攝第四時教也具可勘廣疏料簡也此私記三卷之中所要略抄天暦年中大法師増春御釋延寶七戊未三月十二日一校了寶性院問津于時天保十一子年三月二十四日夜四時寫之畢沙門龍珠理海花押但此私記一卷祕珍之書也他見不可及
